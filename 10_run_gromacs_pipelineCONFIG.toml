# ==============================================================================
# GROMACS Pipeline - Combined Configuration
#
# PURPOSE: Single config file for the GROMACS PPI pipeline orchestrator
#          (10_run_gromacs_pipeline.sh). Merges:
#            - config/PPI/shared/common.toml             (shared defaults)
#            - config/PPI/gromacs/gromacs_pipeline.toml  (pipeline & step settings)
#          Original files archived in: config/PPI/gromacs/legacy/
#
# RECOMMENDED MANUAL WORKFLOW (not the default pipeline.steps order):
#   Run Step 4 first to screen large structure sets -> pick best structures ->
#   run Steps 1+3 for detailed interface analysis ->
#   run Step 2 for chain stability comparison ->
#   run Step 5 for in-depth production MD on the top candidates.
# The default [pipeline].steps array runs in numeric order 1-6 for convenience.
#
# Usage: ./10_run_gromacs_pipeline.sh [--steps step1,step2,...] [--mode MODE]
#                                     [--dry-run] [--list] [-h|--help]
# ==============================================================================


# ==============================================================================
# PIPELINE ORCHESTRATION
# ==============================================================================

[pipeline]
# Gene group (drives config/<GENE_GROUP>/h_protein_structure_analysis_<GENE_GROUP>.toml)
gene_group = "DMP-HAP2"

# Steps to run, in order. Comment out an entry to skip the step.
# Available: "quick_stability", "compare_chain_stability", "interface_analysis",
#            "batch_comparison", "production_md", "visualize_results"
# Override at the command line with --steps step1,step2,...
steps = [
    #"quick_stability",
    "compare_chain_stability",
    "interface_analysis",
    "batch_comparison",
    "production_md",
    "visualize_results",
]

# If true, stop the entire pipeline on the first step failure
stop_on_error = true

# Global overwrite default for all steps.
# true  = wipe and rerun existing output directories
# false = skip steps whose outputs already exist (default)
# Per-step [step.*].override_existing overrides this value.
override_existing = true

# Auto-generate a timestamped run directory under output_base
auto_timestamp_dir = true

# Select compute profile: change to "HPC" for cluster runs
machine = "HPC"

# ==============================================================================
# COMPUTE PROFILES
# Change machine = "Local" or "HPC" above to select the active thread profile.
# Per-step [step.*].max_threads values take precedence; if a per-step key is
# omitted, the profile value below is used; setting it to 0 falls back to nproc.
#
# IMPORTANT (single-GPU scaling ceiling): every step launches
#   gmx mdrun -ntmpi 1 -ntomp $NTHREADS
# i.e. one MPI rank per GPU. GROMACS single-rank GPU runs plateau around
# 16-24 OpenMP threads for typical PPI systems (50-200k atoms); past that,
# PME/FFT cost and L3 cache contention erase gains and mdrun prints
# "Highly inefficient parallelization" warnings. Setting NTHREADS=64 on a
# single-GPU node is measurably SLOWER than NTHREADS=16-24, not faster.
# Structures are processed sequentially within a step, so the unused cores
# are capped by GROMACS scaling, not by these values.
# ==============================================================================

[pipeline.compute.Local]
# Workstation defaults (e.g., 12-core CPU + single GPU)
threads                 = 12    # global fallback for unlisted steps
quick_stability         = 8
compare_chain_stability = 12
interface_analysis      = 12
batch_comparison        = 12
production_md           = 12

[pipeline.compute.HPC]
# HPC node defaults (64-core CPU + single GPU). Tuned to GROMACS single-rank
# scaling ceiling - see note above. Raise production_md to 32 only for systems
# > 200k atoms; lower to 12 for very small complexes.
threads                 = 64    # global fallback for unlisted steps
quick_stability         = 16    # EM only (steep, PME on CPU); plateaus ~16
compare_chain_stability = 16    # full MD, single GPU; plateaus ~16
interface_analysis      = 16    # EM + IE rerun on CPU
batch_comparison        = 16    # light screening EM (5k steps)
production_md           = 24    # long MD, full GPU offload (PME GPU); slight DD headroom


# ==============================================================================
# PATHS
# ==============================================================================

[paths]
input_base = "III_RESULT/DMP-HAP2/08_Protein_Structure/GPE001970_SMEL5/AlphaFold3_Results"

[paths.results]
gromacs = "III_RESULT/DMP-HAP2/10_PPI"


# ==============================================================================
# GROMACS DEFAULTS
# Force field and water model are read by the orchestrator and exported before
# sourcing modules/PPI/gromacs_common.sh, so they are honored by every gmx call.
# Other simulation parameters are set per-step in [step.*] sections below.
# ==============================================================================

[gromacs]
forcefield  = "amber99sb-ildn"
water_model = "tip3p"


# ------------------------------------------------------------------------------
# Trajectory outputs for visualization / video rendering
#
# By default the pipeline writes:
#   md.gro                                (final frame coordinates)
#   md.xtc                                (compressed trajectory)
#   trajectories/md_center.xtc            (centered, PBC-corrected)
#   structures/final_structure.pdb        (final frame as PDB)
#
# This section adds full-precision .trr and a multi-frame .pdb suitable for
# loading into VMD / PyMOL / ChimeraX for video rendering. Increase strides to
# trade resolution for file size.
# ------------------------------------------------------------------------------

[gromacs.trajectory]
# .xtc save interval in MD steps (compressed coords; small, primary trajectory)
nstxout_compressed = 500
# .trr coordinate save interval in MD steps for production MD (0 = disabled).
# Set to a multiple of nstxout_compressed (e.g., 5000) for a coarse but
# full-precision .trr alongside the .xtc.
nstxout_md         = 5000
# .trr velocity save interval (steps); usually equal to nstxout_md or 0.
nstvout_md         = 0
# When true, after production MD runs trjconv to produce a downsampled
# multi-frame trajectories/md_traj.pdb for direct use in video tools that
# do not read .xtc/.trr. Stride is the number of XTC frames between PDB frames.
write_pdb_trajectory = true
pdb_trajectory_stride = 10
# When true, copy md.gro / md.xtc / md.trr (if present) into the structured
# {structures, trajectories} subfolders next to final_structure.pdb so a
# complete .xtc/.trr/.gro/.pdb set is available for video visualization.
promote_raw_outputs  = true


# ------------------------------------------------------------------------------
# Headless VMD video rendering (Step 6: visualize_results)
#
# Renders a per-workdir MP4 from trajectories/md_center.xtc using:
#   1. VMD (headless: vmd -dispdev text -e visualize_movie.vmd)
#   2. ffmpeg (TGA frames -> H.264 MP4)
#
# Both binaries must be on PATH. Set enabled = false to skip.
# Output: <workdir>/video/<workdir_name>_movie.mp4
# ------------------------------------------------------------------------------

[gromacs.video]
enabled         = true
vmd_bin         = "vmd"
ffmpeg_bin      = "ffmpeg"
width           = 1280
height          = 720
fps             = 24
# Render every Nth trajectory frame (1 = all frames; raise for shorter videos)
frame_stride    = 5
# Optional Y-axis rotation between frames (degrees); 0 = no rotation
rotate_per_frame = 0.0
# VMD render method: "TachyonInternal" (high quality, slow) or "snapshot" (fast)
render_mode     = "snapshot"
# H.264 quality (lower CRF = higher quality / larger file; 18-28 is typical)
crf             = 20
# H.264 preset: ultrafast, fast, medium, slow, veryslow
preset          = "medium"
# Keep the per-frame TGAs after MP4 encoding (true = debug; false = clean up)
keep_frames     = false


# ==============================================================================
# STRUCTURES - loaded from config/<GENE_GROUP>/h_protein_structure_analysis_<GENE_GROUP>.toml
# ([ppi_structures].active). Per-step overrides still available below.
# ==============================================================================

# [structures]
# Moved to config/DMP-HAP2/h_protein_structure_analysis_DMP-HAP2.toml [ppi_structures]


# ==============================================================================
# STEP 1 - Quick Stability Comparison (GPU+CPU)
#
# EM-only run. Computes static structural metrics (RMSD, energy, contact map).
# Fastest step - use for initial screening of large structure sets.
# Runtime: minutes per structure.
# ==============================================================================

[step.quick_stability]
enabled           = true
override_existing = false
box_distance      = 1.5
em_steps          = 10000
gpu_id            = 0
max_threads       = 16    # 64-thread server, single GPU; EM plateaus here
# Number of structures processed concurrently. 0 = auto: floor(TOTAL_CPUS / max_threads), >= 1.
# EM-only step. Multiple jobs share the GPU (queue serially); CPU prep parallelizes well.
parallel_structures = 0

# Uncomment to override structures for this step only:
# [step.quick_stability.structures]
# active = [
#     "SmelGRF-GIF/fold_1_x_1_model_0.pdb",
#     "SmelGRF-GIF/fold_2_x_1_model_0.pdb",
# ]


# ==============================================================================
# STEP 2 - Compare Chain Stability (GPU, Full MD)
#
# Full MD simulation (NVT + NPT + production MD) for comparing chain stability
# and computing interaction energies across structures.
# Runtime: hours per structure (10 ns production).
# ==============================================================================

[step.compare_chain_stability]
enabled           = true
override_existing = false
mode              = "full"   # full | sim-only | viz-only | compare-only
box_distance      = 1.5
ion_concentration = 0.15
em_steps          = 50000
nvt_steps         = 100000   # 200 ps
npt_steps         = 100000   # 200 ps
md_steps          = 5000000  # 10 ns
gpu_id            = 0
max_threads       = 16    # 64-thread server, single GPU; full-MD plateau
mdrun_option      = "Option_A"

# Uncomment to override structures for this step only:
# [step.compare_chain_stability.structures]
# active = [...]


# ==============================================================================
# STEP 3 - Interface Analysis (GPU+CPU)
#
# EM-based characterisation of protein-protein interface residues, contacts,
# and buried surface area.
# Runtime: minutes per structure.
# ==============================================================================

[step.interface_analysis]
enabled           = true
override_existing = false
box_distance      = 1.5
em_steps          = 50000
gpu_id            = 0
max_threads       = 16    # 64-thread server, single GPU; EM + IE rerun
# Number of structures processed concurrently. 0 = auto: floor(TOTAL_CPUS / max_threads), >= 1.
# EM-only step. Multiple jobs share the GPU (queue serially); CPU prep parallelizes well.
parallel_structures = 0

# Uncomment to override structures for this step only:
# [step.interface_analysis.structures]
# active = [
#     "SmelGRF-GIF/fold_1_x_1_model_0.pdb",
#     "SmelGRF-GIF/fold_2_x_1_model_0.pdb",
#     "SmelGIF-SWI2/SmelGIF-SWI2.pdb",
# ]


# ==============================================================================
# STEP 4 - Batch Comparison (GPU+CPU)
#
# Ranks all structures in a dataset by EM energy and RMSD. Run first to
# screen a large set and select candidates for Steps 1, 2, 3, and 5.
# Lighter EM (5000 steps) since this is a fast screening pass.
# Runtime: minutes per dataset.
# ==============================================================================

[step.batch_comparison]
enabled           = true
override_existing = false
em_steps          = 5000
box_distance      = 1.5
box_type          = "cubic"
gpu_id            = 0
max_threads       = 16    # 64-thread server, single GPU; light screening EM
# Number of structures processed concurrently within a dataset.
# 0 = auto: floor(TOTAL_CPUS / max_threads), clamped to >= 1.
# Recommended: 4 on 64-core HPC (4 x 16 threads = 64 cores).
# NOTE on GPU contention: with parallel_structures > 1, multiple mdrun jobs
# share gpu_id and queue serially on the GPU. The wall-clock win comes mainly
# from the CPU-bound prep phase (pdb2gmx, editconf, solvate, grompp). Lower
# max_threads (e.g. 8) and raise parallel_structures (e.g. 8) to favour prep
# parallelism over per-mdrun thread count.
parallel_structures = 0

[step.batch_comparison.datasets]
# Dataset folder names (subdirs of paths.input_base).
# NOTE: CIF files are nested in subdirs; batch_comparison uses maxdepth 1.
# To batch-compare all DMP-HAP2 structures, copy/symlink CIFs to a flat dir.
active = [
    # "SmelGRF-GIF",
    # "SmelDMP",
    # "SmelGIF-SWI2",
]


# ==============================================================================
# STEP 5 - Production MD (Full GPU Offload)
#
# Long MD simulation with full GPU offload for in-depth dynamics analysis.
# Longer and more thorough than Step 2: 100 ns production with 500 ps
# equilibration each phase. Run on top candidates selected from earlier steps.
# Runs:  gmx mdrun -deffnm md -v -maxh <max_hours> -ntmpi 1
#                   -nb gpu -pme gpu -bonded gpu -update gpu
# EM:    gmx mdrun -deffnm em -v -ntmpi 1
#                   -nb gpu -pme cpu -bonded gpu
# Runtime: 1-3 days per structure on a single GPU.
# ==============================================================================

[step.production_md]
enabled           = true
override_existing = false
mode              = "full"   # full | sim-only | md-only
box_distance      = 1.5
ion_concentration = 0.15
em_steps          = 50000
nvt_steps         = 250000     # 500 ps
npt_steps         = 250000     # 500 ps
md_steps          = 50000000   # 100 ns
gpu_id            = 0
max_threads       = 24    # 64-thread server, single GPU; full GPU offload, slight DD headroom
max_hours         = 72         # wall-clock cap for production MD (-maxh); raise for longer runs

# Uncomment to override structures for this step only:
# [step.production_md.structures]
# active = [...]


# ==============================================================================
# STEP 6 - Visualize Results (CPU-only, post-processing)
#
# Re-generates plots, visualization scripts, and statistics from existing
# simulation outputs (steps 1-5). No GROMACS runs or GPU needed.
# Runtime: seconds.
# ==============================================================================

[step.visualize_results]
enabled           = true
override_existing = false
dpi               = 600
plot_format       = "png"    # png | svg | pdf
max_contact_pairs = 50
generate_pymol    = true
generate_vmd      = true
generate_chimerax = true

# Limit to specific source steps; comment out to process all found outputs:
# [step.visualize_results.source_steps]
# active = ["compare_chain_stability", "interface_analysis", "production_md"]
