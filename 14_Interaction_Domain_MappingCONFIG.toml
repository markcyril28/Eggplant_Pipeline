# ====================================================================================================================
# Stage 14: In silico HAP2 x DMP interaction-domain mapping
# Consumed by 14_Interaction_Domain_Mapping.sh
# Biology, citations, conformational-state rationale: 14_Interaction_Domain_Mapping_NOTES.md
# --------------------------------------------------------------------------------------------------------------------
# Two experiments under III_RESULT/{label}/14_Domain_Mapping/:
#   stoichiometry_comparison/   WT x WT at 1:1, 2:1, 3:1   ([stoichiometry_comparison])
#   deletion_ladder/            HAP2 x DMP variant grid    ([pairing], anchored at [stoichiometry].basis)
# Master experiment switch: active_comparison (immediately below). Comment a name out to skip that experiment.
# ====================================================================================================================

# Master experiment switch -- which experiments run this invocation.
active_comparison = [
    #"stoichiometry_comparison", 
    "deletion_ladder"
]   # subset of: stoichiometry_comparison | deletion_ladder


# ╔══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╗
# ║ EXPERIMENT 1: STOICHIOMETRY COMPARISON                                                                            ║
# ║    -> III_RESULT/{label}/14_Domain_Mapping/stoichiometry_comparison/                                           ║
# ╚══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝

# Runs WT HAP2 x WT DMP at 1:1, 2:1, 3:1. Justifies (or overrides) [stoichiometry].basis (Section 2). AF3 postfusion-bias caveat (NOTES.md 5.3):
# the 3:1 input returns a postfusion hairpin regardless of input conformation, so postfusion_like probes the activated state, not an on-pathway intermediate.
# Outputs: ranked_stoichiometry.tsv + stoichiometry_comparison.{pdf,png}.
[stoichiometry_comparison]
enabled       = true
hap2_variant  = "WT"   # must match [hap2_variants].rows name
dmp_variant   = "WT"   # must match [dmp_variants].rows name
labels        = ["monomeric", "dimeric", "postfusion_like"]
chain_counts  = [1, 2, 3]   # parallel array: HAP2 copies per label
dmp_copies    = 1
report_metric = "iptm"


# ╔══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╗
# ║ EXPERIMENT 2: DELETION LADDER                                                                                     ║
# ║    -> III_RESULT/{label}/14_Domain_Mapping/deletion_ladder/                                                    ║
# ║    Anchored at [stoichiometry].basis (Section 2).                                                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝

# Combines [hap2_variants] x [dmp_variants] (Section 4) into AF3 jobs. Pair label = "{hap2}__{dmp}" (e.g. WT__WT, delC__WT, WT__delN) - readable from any path.
#   orthogonal  HAP2 ladder x WT DMP + WT HAP2 x DMP ladder; NH+ND-1 pairs (default)
#   matrix      Full NH x ND outer product (consumes AF3 quota fast)
#   pairwise    Zipped (HAP2[i], DMP[i]); shorter side filled with WT
[pairing]
mode = "orthogonal"


# ╔══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╗
# ║ 1. RUNTIME                                                                                                        ║
# ╚══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝

[run]
dry_run           = false   # true = print actions + scaffold output tree only
show_manual       = false   # true = print manual-steps panel [M1]-[M7] and exit
only_ops          = []      # restrict ops by name; [] = all from [domain_mapping].operations
only_variants     = []      # restrict HAP2 variants by name; AND with only_dmp_variants
only_dmp_variants = []

# gene_groups entries are RUN LABELS (not gene families); each pulls config/{label}/14_Interaction_Domain_Mapping_{label}.toml as override.
#   DMP_x_AtHAP2    AtHAP2/At4g11720 + AtDMP8/AT1G09157     (paper-mirroring)
#   DMP_x_SmelHAP2  SmelHAP2 ortholog + SmelDMPv5_10.610    (eggplant-native)
[pipeline]
gene_groups = [
    "DMP_x_AtHAP2", 
    #"DMP_x_SmelHAP2"
]
machine     = "Local"
overwrite   = true

[pipeline.compute.Local]
threads = 4
max_parallel = 1

[pipeline.compute.HPC]
threads = 48
max_parallel = 8

[general]
base_dir = "III_RESULT/DMP_x_AtHAP2"   # overridden per run label


# ╔══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╗
# ║ 2. LADDER BASIS SWITCH (anchors Experiment 2)                                                                     ║
# ╚══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝

# Single HAP2 state used for every deletion-ladder pair. The ladder must vary the deletion, not the stoichiometry. Run
# "stoichiometry_comparison" first to justify the choice. NOTES.md Section 7 (rationale), 5.3 (AF3 postfusion-bias caveat for postfusion_like).
#   monomeric        1 HAP2 : 1 DMP   PRIMARY (Feng 2022 SEC-MALS)
#   dimeric          2 HAP2 : 1 DMP   on-pathway intermediate
#   postfusion_like  3 HAP2 : 1 DMP   activated trimer; AF3 returns postfusion hairpin
[stoichiometry]
basis       = "monomeric"   # monomeric | dimeric | postfusion_like
hap2_copies = 1             # 1 / 2 / 3 for monomeric / dimeric / postfusion_like
dmp_copies  = 1


# ╔══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╗
# ║ 3. OPERATIONS (per active experiment)                                                                             ║
# ╚══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝

# Each experiment listed in `active_comparison` has its own operations list. Ops run in the listed order per pair.
# md_equilibration is POSTPONED until GROMACS modules are wired in; see also [binding_energy].backends (mmpbsa is gated off in tandem).
# alanine_scan is only meaningful for deletion_ladder (residue map of the WT__WT reference pair); stoichiometry_comparison only varies copy number.
[domain_mapping]
enabled = true

[domain_mapping.operations]
stoichiometry_comparison = [
    #"prepare_variants",          # Build WT FASTA + 3 per-stoichiometry complex FASTAs (1:1, 2:1, 3:1)
    "prepare_complexes",         # Submit/run AF3 per stoichiometry; collect rank-1 model + ipTM/pTM
    "interface_analysis",        # freesasa BSA, heavy-atom contacts, per-chain SASA
    ##"md_equilibration",         # POSTPONED - GROMACS short MD
    #"binding_energy",            # FoldX + PRODIGY DG (mmpbsa gated off with GROMACS)
    #"comparative_report",        # ranked_stoichiometry.tsv + stoichiometry_comparison.{pdf,png}
]

deletion_ladder = [
    #"prepare_variants",          # Build HAP2 + DMP truncation FASTAs and per-pair complex FASTAs
    "prepare_complexes",         # Extract downloaded AF3 zips (zip kept as backup); verify rank-1 CIF
    "interface_analysis",        # freesasa BSA, heavy-atom contacts, per-chain SASA
    ##"md_equilibration",         # POSTPONED - GROMACS short MD
    #"binding_energy",            # FoldX + PRODIGY DG (mmpbsa gated off with GROMACS)
    #"alanine_scan",              # MutaTeX + FoldX residue DDG on WT__WT
    #"comparative_report",        # Heatmaps, ranked_pairs.tsv, paper-overlay figures
]


# ╔══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╗
# ║ 4. BIOLOGY INPUTS (shared by both experiments)                                                                    ║
# ╚══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝

# Paths relative to PIPELINE_DIR. hap2_reference_pdb is RMSD comparator for the 1:1 model; use PDB 7S0K (PREFUSION monomer, Feng 2022),
# NOT postfusion trimers 5OW3 / 6E18 / 6DBS (NOTES.md Section 4).
[inputs]
hap2_fasta         = "II_INPUTS/HAP2/AtHAP2_At4g11720.fasta"
dmp_fasta          = "II_INPUTS/DMP/SmelDMPv5_10.610.fasta"
hap2_reference_pdb = "II_INPUTS/HAP2/reference_pdbs/7S0K.pdb"

# Variant tables use single-list rows ("name | description"; comment to disable). Names are species-agnostic; coords differ per species
# and live in .coords.at / .coords.sm. coords_column selects which the orchestrator reads; "TBD" coords are skipped at runtime with a warning.
# WT has no coord entry. First non-comment row MUST be WT (orthogonal pairing uses rows[0] as the WT partner).
# Provenance grouping (paper-direct / paper-implied / extended) and AtDMP8 vs SmelDMP MEME positions: NOTES.md Sections 1, 7.1, 7.2.

[hap2_variants]
coords_column = "at"   # "at" = AtHAP2 (705 aa) | "sm" = SmelHAP2 (804 aa)
rows = [
    "WT          | Full-length HAP2 (positive control)",
    "delC        | C-terminal deletion (Wang 2022 Fig. 3A)",
    "delEcto     | Ectodomain deletion (Wang 2022 Fig. 3A; binds weakly in MbY2H)",
    "delEctoD2   | Ectodomain D2 middle subdomain (VERIFY against Fig. 3A)",
    "delFL       | ~17 aa fusion loop deletion (Class II cd-loop; VERIFY)",
    "delTMD      | Transmembrane domain only (VERIFY)",
#    "delJuxtaMem | 13 aa cytoplasmic juxtamembrane",
    "delEctoAndC | Combined ectodomain + C-terminal (minimal membrane-core)",
]

# AtHAP2 (At4g11720, 705 aa) - Wang 2022 Fig. 3A numbering.
[hap2_variants.coords.at]
delC        = "596-705"
delEcto     = "25-530"
delEctoD2   = "189-330"
delFL       = "234-250"
delTMD      = "561-582"
delJuxtaMem = "583-595"
delEctoAndC = "25-530,596-705"

# SmelHAP2 (804 aa) - remapped from AtHAP2 via MAFFT L-INS-i pairwise alignment of
# II_INPUTS/HAP2/AtHAP2_At4g11720.fasta + II_INPUTS/HAP2/SmelHAP2.fasta.
# Conservative mapping: deletion endpoints pulled inward to the nearest SmelHAP2
# residue (never extended into a SmelHAP2 insert/gap relative to AtHAP2).
# All boundary residues are conserved across the pair (I/I, P/P, N/N, W/W, L/L, E/E).
# Recompute via modules/14_special_pipeline/remap_hap2_coords.py if either FASTA changes.
[hap2_variants.coords.sm]
delC        = "655-804"          # <- AtHAP2 596-705
delEcto     = "22-589"           # <- AtHAP2 25-530  (includes SmelHAP2-specific ectodomain insert)
delEctoD2   = "186-325"          # <- AtHAP2 189-330
delFL       = "231-247"          # <- AtHAP2 234-250 (Class II cd-loop)
delTMD      = "620-641"          # <- AtHAP2 561-582
delJuxtaMem = "642-654"          # <- AtHAP2 583-595
delEctoAndC = "22-589,655-804"   # <- AtHAP2 25-530,596-705

[dmp_variants]
coords_column = "sm"   # "at" = AtDMP8 (243 aa) | "sm" = SmelDMPv5_10.610 (222 aa)
rows = [
    "WT          | Full-length DMP (positive control)",
    "delN        | N-terminal cytoplasmic (before MEME-1/TMD1; Wang 2022 specificity region)",
    "delC        | C-terminal cytoplasmic tail (after MEME-4)",
    "delTMDcore  | Four-TMD bundle (MEME-1 to end of MEME-4; folding-null control)",
#    "delN_pre    | pre-KGV cytoplasmic only (subset of delN)",
#    "delN_KGV    | KGV anchor + late cytoplasmic (subset of delN)",
#    "delTM1      | TMD1 + adjacent (subset of delTMDcore)",
#    "delLinker   | linker between MEME-1 and MEME-2 (subset of delTMDcore)",
#    "delTM23     | TMD2+3 (DUF679 core; subset of delTMDcore)",
#    "delTM4      | TMD4 (subset of delTMDcore)",
]

# AtDMP8 (At1g09157, UniProt O80493, 243 aa) - Stage 06 MEME-anchored.
[dmp_variants.coords.at]
delN       = "1-92"
delC       = "242-243"
delTMDcore = "93-241"
delN_pre   = "1-51"
delN_KGV   = "52-92"
delTM1     = "93-133"
delLinker  = "134-166"
delTM23    = "167-216"
delTM4     = "221-241"

# SmelDMPv5_10.610 (222 aa) - Stage 06 MEME-anchored.
[dmp_variants.coords.sm]
delN       = "1-83"
delC       = "221-222"
delTMDcore = "84-220"
delN_pre   = "1-42"
delN_KGV   = "43-83"
delTM1     = "84-124"
delLinker  = "125-145"
delTM23    = "146-195"
delTM4     = "200-220"


# ╔══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╗
# ║ 5. PER-OP PARAMETERS (shared by both experiments)                                                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝

# Pair FASTAs for AF3 submission. emit_pair_fastas=true writes a per-pair complex FASTA with one record per chain
# ("HAP2_{variant}_chain{X}" / "DMP_{variant}_chain{X}"); copies set by [stoichiometry] (Exp 2) or [stoichiometry_comparison].chain_counts (Exp 1). Layout:
#   stoichiometry_comparison/<label>/WT__WT.fasta
#   deletion_ladder/<pair_label>/<pair_label>.fasta
[prepare_complexes]
backend          = "manual"   # "manual" (default) writes _submission_manifest.tsv + _SUBMIT.txt sentinels for https://alphafoldserver.com/ | "local" uses [tools].af3_binary
af3_seeds        = 5          # ignored in manual mode
emit_pair_fastas = true       # write pair complex FASTAs ready to paste into the AF3 server

[interface]
contact_cutoff_angstrom = 5.0   # heavy-atom distance, Angstrom
sasa_probe_radius       = 1.4   # water probe, Angstrom
include_water_in_sasa   = false
report_per_chain_bsa    = true

# Rank-1 AF3 model only. ipTM = interface; pTM = global fold sanity. AF3 composite = iptm_weight*ipTM + ptm_weight*pTM (AF-Multimer default 0.8/0.2).
[af3_confidence]
iptm_strong     = 0.80   # >= = high-confidence interaction
iptm_borderline = 0.60   # iptm_borderline <= ipTM < iptm_strong = plausible (needs orthogonal support)
ptm_sanity_min  = 0.70   # >= = monomer fold well-predicted; ipTM interpretable
iptm_weight     = 0.80
ptm_weight      = 0.20

# Delegates to PPI stage-10 GROMACS modules. dt_fs=4 requires HMR + virtual H-sites (Hopkins 2015, 10.1021/ct5010406). Tests interface stability,
# not slow conformational change. membrane=true requires CHARMM-GUI POPC/POPE box ([M6]). The dt_fs / virtual_sites / constraints /
# nstxout_compressed_steps keys are documentation until modules/14_special_pipeline/run_short_md.sh exists.
[md_equilibration]
backend                  = "gromacs"
forcefield               = "amber99sb-ildn"
water_model              = "tip3p"
box_padding_nm           = 1.2
ion_concentration        = 0.15
em_steps                 = 50000
nvt_ps                   = 50      # v-rescale settles in 20-50 ps
npt_ps                   = 100     # pressure equilibration is slowest mode
production_ns            = 20
temperature_k            = 310
membrane                 = false   # true after CHARMM-GUI prep
gpu_offload              = true    # CUDA GROMACS required ([M5])
dt_fs                    = 4
virtual_sites            = "hydrogens"   # pdb2gmx -vsite hydrogens
constraints              = "h-bonds"     # required when dt > 2 fs
nstxout_compressed_steps = 5000          # 10 ps (4 fs x 5000 / 2)

# Run all enabled backends; report spread. mmpbsa is POSTPONED with GROMACS.
[binding_energy]
backends                   = "foldx prodigy"        # restore "mmpbsa foldx prodigy" with GROMACS
mmpbsa_start_frame         = 100   # skip equilibration frames
mmpbsa_stride              = 5
mmpbsa_internal_dielectric = 4.0
foldx_n_runs               = 5     # FoldX RepairPDB + AnalyseComplex repeats
prodigy_temperature_c      = 25

# WT/WT pair only, within deletion_ladder/. Stoichiometry inherited from [stoichiometry].basis. reference_* must match WT row of the variant tables.
[alanine_scan]
reference_variant     = "WT"
reference_dmp_variant = "WT"
ddg_threshold_hotspot = 2.0    # kcal/mol
include_dmp_side      = true   # scan both HAP2 and DMP interface residues

# heatmaps render HAP2-variant x DMP-variant matrices at [stoichiometry].basis.
# ranking_metric: iptm | af3_score | foldx_dg | prodigy_dg | mmpbsa_dg | composite (ipTM/pTM cuts from [af3_confidence]; DG thresholds from [binding_energy])
# mark_paper_constructs stars the Wang 2022 pairs (WT__WT, delC__WT, delEcto__WT).
[comparative_report]
figure_format         = "pdf"   # pdf | svg | png | jpeg
include_paper_overlay = true
ranking_metric        = "iptm"          # AF3-first while MMPBSA postponed
#ranking_metric       = "mmpbsa_dg"     # restore with GROMACS
secondary_metrics     = ["ptm", "foldx_dg", "prodigy_dg"]
heatmaps              = ["iptm", "ptm", "af3_score", "foldx_dg", "prodigy_dg"]   # add "mmpbsa_dg" with GROMACS
annotate_cells        = true
mark_paper_constructs = true
scatter_iptm_vs_dg    = true   # sanity-check ipTM vs static DG (FoldX available)
scatter_dg_axis       = "foldx_dg"


# ╔══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╗
# ║ 6. TOOL & ENV WIRING                                                                                              ║
# ╚══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝

[tools]
gromacs_binary = "gmx"   # "gmx_mpi" on HPC
foldx_binary   = ""      # set after [M4]; e.g. "tools/foldx/foldx_20251231"
af3_binary     = ""      # only when [prepare_complexes].backend = "local"

# Orchestrator wraps each op with `conda run -n <env>`. Empty = use launch env.
[conda_envs]
prepare_variants   = "egg"
prepare_complexes  = "alphafold3"   # only when [prepare_complexes].backend = "local"
interface_analysis = "prodigy"      # freesasa + Biopython + PRODIGY
md_equilibration   = "gromacs"
mmpbsa             = "gmxmmpbsa"
foldx_dg           = ""             # FoldX is a static binary
prodigy_dg         = "prodigy"
alanine_scan       = "mutatex"
comparative_report = "egg"          # pandas + matplotlib + seaborn


# ╔══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╗
# ║ 7. CROSS-RUN AGGREGATION (Arabidopsis vs. Eggplant, post-hoc)                                                     ║
# ╚══════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝

# Diffs per-pair DG, ipTM, and hotspot residues across both run labels.
# <!-- COMPLETE: implement modules/14_special_pipeline/cross_run_compare.py -->
[comparison]
enabled       = false
run_labels    = ["DMP_x_AtHAP2", "DMP_x_SmelHAP2"]
metric        = "iptm"   # match [comparative_report].ranking_metric
output_subdir = "Cross_Run_Comparison"   # under III_RESULT/_Cross_Run/


