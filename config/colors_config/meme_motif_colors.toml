    "#448AFF",   #  5  vivid cornflower blue
    "#FF5722",   #  6  deep orange
    "#FF4081",   #  7  hot pink
    "#BDBDBD",   #  8  light silver
    "#1DE9B6",   #  9  neon teal
    "#E040FB",   # 10  vivid purple
]
