# ============================================================================
# Stage 14 per-run override: DMP_x_SmelHAP2 (eggplant-native run)
# ----------------------------------------------------------------------------
# Eggplant-native partner pair: SmelHAP2 ortholog (from Chapter IV) + the
# primary DMP candidate SmelDMPv5_10.610. This run produces the eggplant-side
# of the cross-species comparison (the Arabidopsis-paired side lives at
# config/DMP_x_AtHAP2/).
#
# NOTE: the shared config's [hap2_variants.coords.sm] is now fully remapped to
# SmelHAP2 v5 (SMEL5_08g021940.1, 782 aa) via MAFFT L-INS-i against AtHAP2
# (modules/14_special_pipeline/remap_hap2_coords.py, 2026-05-31). [inputs].hap2_fasta
# below points to the matching 782-aa v5 FASTA, so coords and sequence are consistent.
# Re-run the remap only if either FASTA changes (see --show-manual-steps step [M2]).
#
# Merged on top of 14_interaction_Domain_MappingCONFIG.toml via merge_toml.py.
# ============================================================================

[general]
base_dir = "III_RESULT/DMP_x_SmelHAP2"

[inputs]
hap2_fasta = "II_INPUTS/HAP2/SmelHAP2_v5.fasta"
# DMP and reference PDB inherit from shared config.

# Flip the HAP2 coords table from AtHAP2 (default) to SmelHAP2. The
# [hap2_variants].rows list and the variant names are shared across both
# runs; only the per-species coord values differ. Anything still set to
# "TBD" in [hap2_variants.coords.sm] of the shared config will be skipped
# at runtime with a warning until the SmelHAP2 remap is in hand (see [M2]).
[hap2_variants]
coords_column = "sm"

# Override individual SmelHAP2 coords here once the AtHAP2 -> SmelHAP2
# remap is done (MAFFT --add of AtHAP2 against SmelHAP2; transcribe the
# Wang 2022 cut points onto the aligned columns). Each line replaces the
# matching "TBD" in [hap2_variants.coords.sm] of the shared config:
#
# [hap2_variants.coords.sm]
# delC          = "<smel_C_start>-<smel_C_end>"
# delEcto       = "<smel_ecto_start>-<smel_ecto_end>"
# delEctoD2     = "<smel_D2_start>-<smel_D2_end>"
# delFL         = "<smel_FL_start>-<smel_FL_end>"
# delTMD        = "<smel_TMD_start>-<smel_TMD_end>"
# delEctoAndC   = "<smel_ecto>,<smel_C>"
#
# The DMP side ([dmp_variants]) needs no override: [inputs].dmp_fasta is
# always SmelDMPv5_10.610 and the shared [dmp_variants.coords] already
# carries SmelDMP10.610 numbering anchored to the Stage 06 MEME motifs.
#
# DMP ladder now includes 14 gRNA-anchored variants (refreshed 2026-05-25),
# anchored exclusively to SmelDMPv5_10.610 (Stage 09 CRISPR-Local v1 output).
# Source: guide_comparison_table_moderate.tsv (off-targets <= 2, cut in CDS)
# in III_RESULT/DMP/09_CRISPR_Off-Target_Analysis/GPE001970_SMEL5/
#   06_Summary_Report/tables/ , plus the operator-selected Guide4 from the
# raw CRISPR-P TSV (01_Raw_Scoring_Results_from_CRISPR-P_V2_0/...) -- a
# very-early-CDS cut with 0 off-targets.
#
# Each guide produces a matched pair of variants:
#   delGuide*  = post-cut protein truncation (keep aa 1..last_full_codon)
#   fsGuide*   = +1 NHEJ insertion at the DSB, re-translated until first
#                new stop codon (predominant Cas9/NHEJ repair outcome)
#
# Guide table (cut aa = codon containing the DSB on the CDS):
#   Guide  | Score  | Tier     | Strand | OT | cut aa | del keeps  | fs len
#   -------+--------+----------+--------+----+--------+------------+-------
#   Guide4 | 0.1172 | Low      |   +    | 0  |   7    |    1-6     |  10
#   Guide17| 0.8725 | High     |   +    | 1  |  118   |    1-118   | 141
#   Guide16| 0.4235 | Low      |   +    | 1  |  118   |    1-117   | 141
#   Guide20| 0.4861 | Low      |   +    | 1  |  129   |    1-128   | 141
#   Guide37| 0.5374 | Moderate |   +    | 2  |  216   |    1-215   | 240
#   Guide46| 0.4683 | Low      |   -    | 2  |   27   |    1-27    |  42
#   Guide50| 0.4767 | Low      |   -    | 2  |   80   |    1-80    |  83
#
# Frameshift sequences are derived at runtime from the transcript
# ([inputs].dmp_transcript_fasta in the shared config) by
# generate_variants.py --mode frameshift; the variant table re-derives
# automatically if the guide list ever changes. These pairs (WT_HAP2 x
# {del,fs}Guide*) bridge Stage 09 (guide design) and Stage 14
# (interaction-domain mapping): the AF3+PRODIGY+MMPBSA verdict on each
# variant is the in-silico prediction for the wet-lab CRISPR KO phenotype
# of that guide. The Arabidopsis-paired run (DMP_x_AtHAP2) does NOT
# include these variants - they are eggplant-specific.
