# download_method values:
#   wget         direct HTTPS/FTP fetch via wget (default)
#   ncbi_efetch  NCBI eutils efetch by accession (single-record retrieval)
#   phytozome    JGI Phytozome/PhytoMine (requires phytozome.jgi_user/password)
#   manual       no programmatic mirror; flagged as needing operator action
#
# requires_login flags assemblies behind authentication gates (Phytozome).
