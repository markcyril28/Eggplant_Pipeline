# ════════════════════════════════════════════════════════════════════════════
#  dmp_interaction — DMP.interaction structural palette
#  Synchronized with [DMP.interaction] in protein_structure_colors.toml.
#  Colors are assigned by MEME discovery order mapped to the DMP secondary
#  structure of the reference eggplant sequence (smel5_01g026030.1, 178 aa):
#
#   Motif 1  (pos  69– 89) → Extracellular β-sheet            #F5DEB3
#   Motif 2  (pos 143–171) → TM4                              #D43005
#   Motif 3  (pos  98–138) → TM3                              #D43005
#   Motif 4  (pos  10– 50) → TM1 / N-terminal helix           #D43005
#   Motif 5  (pos  54– 68) → TM2                              #D43005
#   Motif 6  (pos   0 in paralogs) → N-terminal domain        #D9A621
#   Motifs 7–9 (weak, pos 0)       → Loops / N-term variants  #B3B3B3
#
#  Secondary structure boundaries derived from PyMOL DSS on the AlphaFold3
#  model (fold_2026_04_07_13_17_smel5_01g026030_1_model_0.pdb).
# ════════════════════════════════════════════════════════════════════════════
[dmp_interaction]
# Positional fallback palette (used for non-protein/nucleotide datasets and
# when domain_colors_json is not applied).  Order matches MEME discovery rank.
colors = [
    "#F5DEB3",   #  1  beige            (Motif 1 → Extracellular β-sheet)
    "#D43005",   #  2  deep orange-red  (Motif 2 → TM4)
    "#D43005",   #  3  deep orange-red  (Motif 3 → TM3)
    "#D43005",   #  4  deep orange-red  (Motif 4 → TM1)
    "#D43005",   #  5  deep orange-red  (Motif 5 → TM2)
    "#D9A621",   #  6  golden amber     (Motif 6 → N-terminal domain)
    "#B3B3B3",   #  7  gray70           (Motif 7 → loop / N-term variant)
    "#B3B3B3",   #  8  gray70           (Motif 8 → loop / N-term variant)
    "#B3B3B3",   #  9  gray70           (Motif 9 → loop / N-term variant)
    "#B3B3B3",   # 10  gray70           (fallback)
]

# Explicit per-motif color mapping for amino-acid datasets (passed as
# --domain-colors to plot_motif_locations.py).  Keys are motif numbers (1-based).
domain_colors_json = '{"1":"#F5DEB3","2":"#D43005","3":"#D43005","4":"#D43005","5":"#D43005","6":"#D9A621","7":"#B3B3B3","8":"#B3B3B3","9":"#B3B3B3"}'

# Grouped legend labels for --domain-labels.  Maps hex color → structural name.
domain_labels_json = '{"#D43005":"Transmembrane Helices (TM1-TM4)","#F5DEB3":"Extracellular beta-sheet","#D9A621":"N-terminal Domain","#B3B3B3":"Loops"}'


