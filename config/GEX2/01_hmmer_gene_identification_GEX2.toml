# ============================================================================
# Eggplant Pipeline Configuration: GEX2 — 01_Identification (HMMER)
# ============================================================================
# Gene-group overrides only. Shared defaults (method, db_type, targets,
# hmmer_params, nhmmer_params, cdhit_params, cdhit_est_params) live in
# 01_hmmer_identifyCONFIG.toml (project root) and are deep-merged.
# HMM profile is declared in 01_hmmer_identifyCONFIG.toml under
# [identification.gene_groups.GEX2].
#
# Profile: Pfam PF23616 (Ig_GEX2_N, GEX2 N-terminal Ig-like domain)
# The Pfam HMM carries per-family GA thresholds (27 27), so the shared
# [identification.hmmer_params].use_ga = true is appropriate — no override
# needed. The family is plant-restricted (Embryophyta / Viridiplantae per
# InterPro taxonomy), so no taxonomic post-filtering is required either.
# ============================================================================
