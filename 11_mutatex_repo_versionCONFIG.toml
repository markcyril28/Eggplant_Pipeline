# ==============================================================================
# MutateX (FoldX) Configuration
# (k_mutatex_repo_version.sh)
#
# Values here override common.toml defaults.
# ==============================================================================

# ==============================================================================
# Compute profile (mirrors the 05_phylo pattern).
#
# FoldX is single-threaded; mutatex -p controls parallel FoldX jobs.
# `threads` here = explicit FoldX jobs per PDB; >0 forces 1 PDB at a time.
# `max_parallel_pdbs` = max PDBs processed concurrently.
# Either key set to 0 triggers full auto-detect via nproc in the orchestrator.
#
# Switch by editing `machine` below; do NOT edit 11_mutatex_repo_version.sh.
# ==============================================================================
[pipeline]
machine = "Local"  # "Local" or "HPC" - selects compute profile below

[pipeline.compute.Local]
# 12-core laptop / workstation default
threads            = 0   # 0 = auto-detect; >0 = explicit FoldX jobs per PDB
max_parallel_pdbs  = 0   # 0 = auto from CPU count

[pipeline.compute.HPC]
# 32-core (or larger) HPC node - saturate aggressively
threads            = 64   # 0 = auto on HPC node
max_parallel_pdbs  = 0   # 0 = auto from CPU count

[settings]
# Non-machine-specific runtime parameters.
nruns              = 5
force_rerun        = true
# Per-PDB timeout in hours (prevents infinite hangs). 0 = no timeout.
per_pdb_timeout_hours = 48
# Parallel workers for post-processing Python scripts (extraction + visualization).
# 0 = auto-determined (TOTAL_CPUS / 2, since both scripts run simultaneously).
post_processing_workers = 0

[settings.debug]
debug_mode      = true
verbose_logging = true

# ==============================================================================
# Transient File Cleanup
#
# MutateX saturation mutagenesis generates ~196 GB of intermediate PDB files
# per structure. Two cleanup phases prevent disk exhaustion:
#
#   Phase 1 (during run): A background worker polls mutations/ every
#           `worker_interval_seconds` seconds and removes *.pdb files and
#           molecules/ subdirectories from mutation directories that already
#           have Average_*.fxout (i.e. FoldX finished for that mutation).
#
#   Phase 2 (post-run):  Aggressive one-shot cleanup removes ALL transient
#           files listed in `delete_patterns`, keeping only the file patterns
#           listed in `preserve_patterns` (required by the visualization and
#           critical-residues scripts).
#
# IMPORTANT — `preserve_patterns` is an explicit safety list.  Any file
# matching a preserve pattern is NEVER deleted, even if it also matches a
# delete pattern.  This guarantees that visualization inputs survive cleanup.
# ==============================================================================
[cleanup]
enabled                = true       # Master switch for both cleanup phases
worker_interval_seconds = 30        # Phase-1 polling interval (seconds)

# Glob patterns of transient files to DELETE (relative to mutations/)
# NOTE: These arrays are reference documentation for the patterns hardcoded in
# mutatex_utils.sh (cleanup_worker + cleanup_mutations_dir). Changing values
# here alone will NOT alter runtime behaviour — update the bash functions too.
delete_patterns = [
    "*.pdb",                  # Mutant & WT structures (~280 MB each)
    "Raw_*.fxout",            # Raw FoldX energy output
    "PdbList_*.fxout",        # FoldX intermediate PDB lists
    "molecules/",             # Temporary FoldX work directories
]

# Glob patterns to ALWAYS PRESERVE — visualization & extraction depend on these.
# A file matching any preserve pattern is exempt from deletion.
# (Same caveat as delete_patterns — these document the bash-level logic.)
preserve_patterns = [
    "Average_*.fxout",                     # Summary ΔΔG per mutation (Phase 1+2)
    "Dif_*.fxout",                         # Difference energies
    "selfmutation_energies*.dat",          # Selfmutation summary data
    "results/",                            # Entire results tree
    "results_selfmutation/",               # Selfmutation results tree
    "pymol_visualization/",                # PyMOL visualization output
    "critical_residues/",                  # Critical residue extraction output
    "visualizations/",                     # Matplotlib visualization output
]

[environment]
conda_env = "PPI"

[paths]
# Paths relative to the project root (SCRIPT_DIR)
foldx_binary       = "modules/PPI/foldx_20270131_5.1"
rotabase           = "modules/PPI/rotabase.txt"

# Same input base as GROMACS (config/PPI/shared/common.toml → paths.input_base)
input_base         = "III_RESULT/DMP-HAP2/08_Protein_Structure/GPE001970_SMEL5/AlphaFold3_Results"
results_dir        = "III_RESULT/DMP-HAP2/11_PPI_MutateX"

[paths.templates]
repair    = "modules/PPI/repair_runfile_template.txt"
mutate    = "modules/PPI/mutate_runfile_template.txt"
interface = "modules/PPI/interface_runfile_template.txt"

[structures]
# PDB paths relative to paths.input_base (same structures used by GROMACS pipeline).
# MutateX requires PDB format; each AlphaFold3 directory contains both CIF and PDB.
active = [
    "hap2_and_smel5_01g008730_1/hap2_and_smel5_01g008730_1.pdb",
    "hap2_and_smel5_01g026030_1/hap2_and_smel5_01g026030_1.pdb",
    "hap2_and_smel5_02g013320_1/hap2_and_smel5_02g013320_1.pdb",
    "hap2_and_smel5_04g005390_1/hap2_and_smel5_04g005390_1.pdb",
    "hap2_and_smel5_10g003660_1/hap2_and_smel5_10g003660_1.pdb",
    "hap2_and_smel5_10g017610_1/hap2_and_smel5_10g017610_1.pdb",
    "hap2_and_smel5_12g005350_1/hap2_and_smel5_12g005350_1.pdb",
]

# ==============================================================================
# Visualization settings (b_mutatex_generate_mutatex_visualizations.py)
#
# Controls all Matplotlib and PyMOL outputs.  The heatmap color-scale limits
# (vmin / vmax) directly affect how ΔΔG data is perceived — set them to
# span the expected energy range so that mild effects are not washed out.
# ==============================================================================

[visualization]
results_dirs      = ["III_RESULT/DMP-HAP2/11_PPI_MutateX"]
figure_format     = "png"
dpi               = 300

# --- Colormaps ---
heatmap_cmap      = "plasma"        # Heatmap matrices (AA × position)
diverging_cmap    = "RdBu_r"        # ±ΔΔG diverging data
distrib_cmap      = "viridis"       # Distribution histograms

# --- Heatmap scale ---
heatmap_vmin      = -3.0            # kcal/mol — lower color-scale bound
heatmap_vmax      =  5.0            # kcal/mol — upper color-scale bound
heatmap_chunk_cols = 100            # Max columns before splitting into parts
heatmap_cell_size  = 0.4            # Cell dimension (inches)

# --- Thresholds (kcal/mol) ---
hotspot_threshold         = 1.0     # |ΔΔG| above this → interface hotspot
hotspot_selfmut_threshold = 0.1     # Selfmutation hotspot threshold
stability_threshold_pos   = 0.5     # Profile bar: red  (destabilizing)
stability_threshold_neg   = -0.5    # Profile bar: blue (stabilizing)
ddg2pdb_threshold         = 0.5     # ddg2pdb B-factor encoding threshold

# --- Top-N limits ---
top_n_mutations           = 30      # Top mutations bar chart
top_n_surface             = 50      # Interface surface heatmap (per chain)
top_n_critical_contacts   = 20      # Focused critical-contact heatmap

# Amino-acid row order — must match mutation_list.txt used by MutateX/FoldX
aa_order = ["G","A","V","L","I","M","F","W","P","S","T","C","Y","N","Q","D","E","K","R","H"]

# --- PyMOL 3D visualization (generate_pymol_visualization) ---
[visualization.pymol]
color_min_spectrum  = 0             # B-factor spectrum lower bound
color_max_spectrum  = 10            # B-factor spectrum upper bound
hotspot_b_cutoff    = 5             # B-factor above which residues are shown as sticks
surface_transparency = 0.7          # Surface transparency (0 = opaque, 1 = invisible)
color_scheme        = "blue_white_red"  # PyMOL spectrum palette

# ==============================================================================
# Critical Residues Extraction
# (c_mutatex_extract_all_critical_residues.py / extract_critical_residues.py)
# ==============================================================================

[critical_residues]
output_subdir           = "critical_residues"
destabilizing_threshold = 2.0
stabilizing_threshold   = -2.0
top_n                   = 30
