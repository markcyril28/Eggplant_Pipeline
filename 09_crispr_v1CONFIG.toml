# ============================================================================
# Shared Pipeline Configuration - 09_CRISPR Analysis Defaults
# ============================================================================
# Default CRISPR parameters shared across all gene groups.
# Gene-group overrides (grna_fastas) live in
# config/{GROUP}/09_crispr_analysis_{GROUP}.toml.
# ============================================================================


# ============================================================================
# 1. Pipeline Settings
# ============================================================================

[pipeline]
# Gene groups to process. Available: "DMP", "HAP2", "GRF_GIF", "PLA"
gene_groups = ["DMP"]

machine   = "Local"   # "Local" or "HPC" - selects compute profile below
overwrite = true

[pipeline.compute.Local]
threads               = 12   # Total CPU threads available
blast_optimal_threads = 4    # Threads per BLAST/Cas-OFFinder job (~4 is efficient)
max_parallel          = 3    # Concurrent jobs (threads / blast_optimal_threads)

[pipeline.compute.HPC]
threads               = 64   # Total CPU threads on HPC node
blast_optimal_threads = 4    # Threads per BLAST/Cas-OFFinder job
max_parallel          = 16   # Concurrent jobs


# ============================================================================
# 2. CRISPR Stage - Operations & Thresholds
# ============================================================================

[crispr]
enabled = true

# Operations to run (comment out to skip).
# Core analysis ops produce TSV/CSV outputs; report ops produce figures/tables.
operations = [
    # ---- Core analysis ----
    #"blast_offtarget",
    "score_filter",
    "cas_offinder",

    # ---- Figures & report ----
    "report",

    # ---- Gene-structure annotation (07_GenBank_with_gRNA_Annotations/) ----
    "annotate_genbank",
]

# On-target score filtering (Doench 2016 RS2 / Azimuth scale, 0-1).
# Tiers: High >= 0.7 (top quartile, [Doench 2016]);
#        Moderate >= 0.5 (plant CRISPR cutoff, [Liu 2020; Sun 2022]).
score_thresholds = [0.5, 0.7]


# ============================================================================
# 3. Inputs - Genomes & gRNA FASTAs
# ============================================================================

# Genome subdirectories to process.
[crispr.genomes]
names = ["GPE001970_SMEL5"]

# gRNA FASTA files for off-target analysis.
# One subsection per gene group: [crispr.offtarget.{GROUP}]
# Paths are relative to PIPELINE_DIR.
[crispr.offtarget.DMP]
grna_fastas = [
    "II_INPUTS/DMP/gRNAs/SmelDMP_10_200_guide_RNAs.fasta",
    "II_INPUTS/DMP/gRNAs/SmelDMP_01_990_guide_RNAs.fasta",
    "II_INPUTS/DMP/gRNAs/SmelDMP_02_guide_RNAs.fasta",
]

[crispr.offtarget.HAP2]
grna_fastas = [
    "II_INPUTS/HAP2/gRNAs/SmelHAP2_guide_RNAs.fasta",
]

[crispr.offtarget.DMP-HAP2]
grna_fastas = [
    "II_INPUTS/DMP-HAP2/gRNAs/SmelDMP-HAP2_guide_RNAs.fasta",
]


# ============================================================================
# 4. Output - Substage Directory Names
# ============================================================================

[crispr.dirs]
raw_results          = "01_Raw_Scoring_Results_from_CRISPR-P_V2_0"
filtered_prefix      = "0{n}_Filtered_Score_{t}"   # {n}=substage number, {t}=threshold
blast_offtarget      = "04_Off_Target_BLAST"
cas_offinder         = "05_Off_Target_Cas-OFFinder"
summary_report       = "06_Summary_Report"
genbank_annotations  = "07_GenBank_with_gRNA_Annotations"


# ============================================================================
# 5. Tool Parameters
# ============================================================================

# ---- BLAST off-target parameters (most accurate) ----
# Tuned for SpCas9 gRNA off-target detection in plant genomes.
[crispr.blast]
word_size       = 7       # short-query mode for 20-23 nt sgRNAs [CRISPOR; Concordet 2018]
evalue          = 10000   # permissive; filter post-hoc by mm count
dust            = false   # masking removes legitimate AT-rich plant regulatory regions
ungapped        = true    # SpCas9 indel off-targets are functionally rare [Doench 2016]
reward          = 1       # uniform mismatch sensitivity [Altschul 1990]
penalty         = -1
max_target_seqs = 10000   # default 500 truncates in plant genomes (~1 Gb)
qcov_hsp_perc   = 80      # >= 80% guide aligned; rejects partial-match noise
max_mismatches  = 4       # SpCas9 cleaves up to 3-4 mm at PAM-distal sites [Hsu 2013]

# ---- Cas-OFFinder settings (most accurate) ----
[crispr.cas_offinder]
enabled        = true
pam            = "NNNNNNNNNNNNNNNNNNNNNGG"   # SpCas9 canonical NGG PAM
device         = "C"   # C = CPU-only (WSL2: OpenCL GPU is unreliable; module auto-falls back anyway)
max_mismatches = 3     # plant CRISPR safety standard [Wolter 2019]; SpCas9 cleavage
                       # at >3 mm is rare and usually seed-conserved [Hsu 2013].

# ---- GenBank gRNA annotation (operation: annotate_genbank) ----
# Pulls gene-structure .gb files from {gb_subpath} (relative to base_dir;
# {genome} is substituted per genome) and writes annotated copies under
# 07_GenBank_with_gRNA_Annotations/. Two variants per gene:
#   01_Score_<HIGH>_above/         strict shortlist (score >= high_threshold)
#   02_Score_<MOD>_above_incl_<H>/ combined (score >= mod_threshold; HIGH-tier
#                                            guides tagged "_HIGH>=<H>" in label)
# Off-target hits exceeding max_mm mismatches are excluded from the per-feature
# mm0..mmN counts (default 3, matching cas_offinder.max_mismatches).
[crispr.annotate_genbank]
high_threshold  = 0.7
mod_threshold   = 0.5
max_mm          = 3
gb_subpath      = "01_Identification/{genome}/e-value_1e-5/e_GENE_Structures/DMP/without_up_and_downstream"
output_dir_name = "07_GenBank_with_gRNA_Annotations"


# ============================================================================
# 6. Report & Visualization
# ============================================================================

[crispr.report]
dpi    = 600     # plot resolution (600 = publication quality)
format = "png"   # png | svg | pdf

# ---- Scatter plot y-axis ----
# Upper bound for off-target count (y-axis). Set to 0 for auto-scale (max * 1.15).
# Positive values clamp the axis - guides above the cap render at the top edge
# with "(>cap)" appended, improving readability when a few outliers exist.
y_max_cap = 10

# ---- guide_comparison_table inclusion thresholds ----
# Two table variants are written next to the scatter:
#   guide_comparison_table.{png,csv,tsv}           : strict   (publication shortlist)
#   guide_comparison_table_moderate.{png,csv,tsv}  : moderate (includes near-miss
#                                                              candidates)
#
# Inclusion is threshold-only (no hidden top-N cap). A guide enters a table iff:
#     score       >= score_threshold      AND
#     off-targets <= offtarget_threshold
#
# Score thresholds are NOT redeclared here. They derive from
# [crispr].score_thresholds (above) so the score_filter operation, the scatter
# plot threshold lines, and the filtered tables all stay in sync.
# Convention: smallest value = moderate (orange line), largest = strict (green line).
offtarget_strict   = 3   # publication shortlist; plant 3-mm median [Modrzejewski 2020]
offtarget_moderate = 8   # near-miss tolerance at 3-mm [Wolter 2019; Bortesi 2015]


