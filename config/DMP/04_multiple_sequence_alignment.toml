# ============================================================================
# Eggplant Pipeline Configuration: DMP — 04_MSA
# ============================================================================
#
# Input sources:
#   A) HMMER-identified sequences — produced by 01_Identification, merged by
#      02_BLAST_Alignment into single protein/transcript FASTAs.
#   B) Cross-species query FASTAs — the BLAST query files listed in
#      [ortholog_blast].query_fastas (02_blast_ortholog_alignment.toml).
#
# Each input_set is a labeled combination of (scope × sequence type).
# The orchestrator outputs to 04_MSA/<top_folder>/All_Result/<set_name>/<METHOD>_aligned/
# so combinations with identical file basenames never collide and per-genome
# outputs are separated at the first folder.
# Curated selections live in 04_MSA/<top_folder>/Selected_Result/v1_Full/.
# ============================================================================

[alignment]
# methods and sequence_types are defined in the shared root config:
#   04_msa_alignmentCONFIG.toml  →  [alignment]
# Override here only if this gene group needs a different selection.

# --- Active input sets (comment in/out to select) -------------------------
# Only sets listed here will be processed.  Section definitions below
# provide fastas, merge flags, and output_subdir for each set.
active_input_sets = [
    # — Per-genome: single genome —
    #"per_genome_smel_v4_1_nucleotide",
    #"per_genome_smel_v4_1_amino_acid",
    "per_genome_gpe001970_nucleotide",
    "per_genome_gpe001970_amino_acid",

    # — All eggplant: both genomes merged —
    #"all_eggplant_nucleotide",
    #"all_eggplant_amino_acid",

    # — Eggplant + cross-species query FASTAs (merge at runtime) —
    #"eggplant_and_query_species_nucleotide",
    #"per_genome_smel_v4_1_nucleotide_and_query_species_nucleotide",
    #"per_genome_smel_v4_1_amino_acid_and_query_species_amino_acid",
    #"per_genome_gpe001970_nucleotide_and_query_species_nucleotide",
    #"per_genome_gpe001970_amino_acid_and_query_species_amino_acid",

    # — Fixed / corrected merged inputs —
    #"per_genome_gpe001970_nucleotide_and_query_species_nucleotide_fixed",

    # — Selected / curated inputs —
    "selected_v1_full_amino_acid",
    "selected_v1_full_nucleotide",
    #"selected_v2_reduced_nucleotide",

    # — Selected v1_Full + verified haploid-inducer DMP panel (Chapter II Table 1) —
    # Built reproducibly by modules/04_multiple_sequence_alignment/build_v1_full_HI_DMPs.sh
    # which concatenates eggplant per-genome HMMER hits + 14 HI species merged FASTAs
    # from I_RefSeqs/d_DMP_Query_Fasta/. Re-run that script after updating HI species.
    "selected_v1_full_HI_DMPs_nucleotide",
    "selected_v1_full_HI_DMPs_amino_acid",

    # — Selected v3 = v1_Full Selected Crop Species + HI_DMPs panel, deduplicated —
    # Pre-merged with sequence-content dedup (drops the 7 SmelDMP paralogs and any
    # cross-source duplicates). Source files live in
    # 04_MSA/merged_input/Selected/v3_Full_and_HI_DMPs/.
    #"selected_v3_full_and_HI_DMPs_nucleotide",
    #"selected_v3_full_and_HI_DMPs_amino_acid",

    # — Selected v4 = per-paralog MSA inputs from BLAST lollipop groups —
    # One FASTA per anchor SmelDMP × sequence type, holding the anchor plus
    # all BLAST hits whose Bit Score crosses [blast_groups_msa].bitscore_threshold
    # (default 200). Built reproducibly by:
    #   bash modules/04_multiple_sequence_alignment/build_v4_blast_groups.sh
    # Files live in 04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/.
    #"selected_v4_blast_groups_01g008730_nucleotide",
    #"selected_v4_blast_groups_01g008730_amino_acid",
    
    #"selected_v4_blast_groups_01g026030_nucleotide",
    #"selected_v4_blast_groups_01g026030_amino_acid",
    
    #"selected_v4_blast_groups_02g013320_nucleotide",
    #"selected_v4_blast_groups_02g013320_amino_acid",
    
    #"selected_v4_blast_groups_04g005390_nucleotide",
    #"selected_v4_blast_groups_04g005390_amino_acid",
    
    #"selected_v4_blast_groups_10g003660_nucleotide",
    #"selected_v4_blast_groups_10g003660_amino_acid",
    
    #"selected_v4_blast_groups_10g017610_nucleotide",
    #"selected_v4_blast_groups_10g017610_amino_acid",
    
    #"selected_v4_blast_groups_12g005350_nucleotide",
    #"selected_v4_blast_groups_12g005350_amino_acid",

    # — Selected v4 merged: all 7 paralog BLAST groups concatenated, deduped —
    # Single combined FASTA per sequence type covering the union of all v4
    # per-paralog BLAST groups (anchor + Bit Score >= 200 hits), deduplicated
    # by header first-token. Source files live in
    # 04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/.
    "selected_v4_blast_groups_merged_nucleotide",
    "selected_v4_blast_groups_merged_amino_acid",

    # — GPE001970 + Selected Crop Species (curated pre-merged) — v1 Full Selected
    #"per_genome_gpe001970_nucleotide_and_selected_crop_species_nucleotide",
    #"per_genome_gpe001970_amino_acid_and_selected_crop_species_amino_acid",

    # — Smel v4.1 + Selected Crop Species (uncomment once files exist) —
    #"per_genome_smel_v4_1_nucleotide_and_selected_crop_species_nucleotide",
    #"per_genome_smel_v4_1_amino_acid_and_selected_crop_species_amino_acid",
]

# Shared MSA configuration lives in 04_msa_alignmentCONFIG.toml at the project root:
#   [alignment]                 methods, sequence_types
#   [alignment.sources]         hmmer_nucleotide, hmmer_amino_acid
#   [alignment.clustalo|mafft|muscle|probcons|clustalw]   per-tool tuning
# The MSA orchestrator deep-merges that file with this one (group-specific
# values win on conflict). Override any of the above blocks here only if DMP
# needs a different value.

# --- Input sets -----------------------------------------------------------
# All paths relative to base_dir (III_RESULT/DMP).  Files are referenced
# in-place — no copies.  Only merge-flagged sets create a new file.
#
# Naming convention: <scope>_<genome>_<sequence_type>
#   scope:         per_genome | all_eggplant | eggplant_and_query_species
#   genome:        smel_v4_1 | gpe001970 | (omitted when both)
#   sequence_type: nucleotide | amino_acid
#
# Each set outputs to: 04_MSA/<top_folder>/All_Result/<set_name>/<METHOD>_aligned/
# Curated selections go in:  04_MSA/<top_folder>/Selected_Result/v1_Full/

[alignment.input_sets]

# --- Per-genome: one genome at a time -------------------------------------

# Per-genome HMMER outputs are produced by 01_hmmer_identify.sh under
# 01_Identification/<genome>/e-value_<E>/c_CD_HIT_Reduced/<PFAM>/  where <E>
# matches [identification].e_value in 01_hmmer_identifyCONFIG.toml (currently 1e-5).
[alignment.input_sets.per_genome_smel_v4_1_nucleotide]
fastas  = ["01_Identification/Solanum_melongena_v4.1/e-value_1e-5/c_CD_HIT_Reduced/PF05078_DMP/PF05078_DMP_transcripts_cdhit.fa"]

[alignment.input_sets.per_genome_smel_v4_1_amino_acid]
fastas  = ["01_Identification/Solanum_melongena_v4.1/e-value_1e-5/c_CD_HIT_Reduced/PF05078_DMP/PF05078_DMP_proteins_cdhit.fa"]

[alignment.input_sets.per_genome_gpe001970_nucleotide]
fastas  = ["01_Identification/GPE001970_SMEL5/e-value_1e-5/c_CD_HIT_Reduced/PF05078_DMP/PF05078_DMP_transcripts_cdhit.fa"]

[alignment.input_sets.per_genome_gpe001970_amino_acid]
fastas  = ["01_Identification/GPE001970_SMEL5/e-value_1e-5/c_CD_HIT_Reduced/PF05078_DMP/PF05078_DMP_proteins_cdhit.fa"]

# --- All eggplant: both genomes merged ------------------------------------

[alignment.input_sets.all_eggplant_nucleotide]
fastas  = ["02_BLAST_Alignment/hmmer_identified_transcripts.fa"]

[alignment.input_sets.all_eggplant_amino_acid]
fastas  = ["02_BLAST_Alignment/hmmer_identified_proteins.fa"]

# --- Eggplant + cross-species query FASTAs --------------------------------
# Merge: concatenates listed fastas + ortholog_blast.query_fastas at runtime.
# Query FASTAs are nucleotide-only, so no amino acid cross-species set.

[alignment.input_sets.eggplant_and_query_species_nucleotide]
merge   = true
fastas  = ["02_BLAST_Alignment/hmmer_identified_transcripts.fa"]
# query_fastas from [ortholog_blast] are appended automatically during merge

[alignment.input_sets.per_genome_smel_v4_1_nucleotide_and_query_species_nucleotide]
merge   = true
fastas  = ["01_Identification/Solanum_melongena_v4.1/e-value_1e-5/c_CD_HIT_Reduced/PF05078_DMP/PF05078_DMP_transcripts_cdhit.fa"]

[alignment.input_sets.per_genome_smel_v4_1_amino_acid_and_query_species_amino_acid]
merge   = true
fastas  = ["01_Identification/Solanum_melongena_v4.1/e-value_1e-5/c_CD_HIT_Reduced/PF05078_DMP/PF05078_DMP_proteins_cdhit.fa"]

[alignment.input_sets.per_genome_gpe001970_nucleotide_and_query_species_nucleotide]
merge   = true
fastas  = ["01_Identification/GPE001970_SMEL5/e-value_1e-5/c_CD_HIT_Reduced/PF05078_DMP/PF05078_DMP_transcripts_cdhit.fa"]

[alignment.input_sets.per_genome_gpe001970_amino_acid_and_query_species_amino_acid]
merge   = true
fastas  = ["01_Identification/GPE001970_SMEL5/e-value_1e-5/c_CD_HIT_Reduced/PF05078_DMP/PF05078_DMP_proteins_cdhit.fa"]

# --- GPE001970 fixed nucleotide (pre-assembled corrected merged file) -----
[alignment.input_sets.per_genome_gpe001970_nucleotide_and_query_species_nucleotide_fixed]
fastas  = ["04_MSA/merged_input/All/per_genome_gpe001970_nucleotide_and_query_species_nucleotide_fixed.fa"]

# --- Selected / curated inputs (manual curation of representative species) -
# Paths are relative to base_dir (III_RESULT/DMP).
# output_subdir is auto-inferred from the set name by resolve_output_subdir():
#   *selected*v2* | *v2_reduced*  → Selected_Result/v2_Reduced
#   *selected*                    → Selected_Result/v1_Full
#   (default)                     → All_Result
# Add an explicit output_subdir key only to override this behaviour.

[alignment.input_sets.selected_v1_full_amino_acid]
fastas = ["04_MSA/merged_input/Selected/v1_Full/per_genome_gpe001970_and_Selected_Crop_Species_AMINO_ACID_Sequence.fasta"]

[alignment.input_sets.selected_v1_full_nucleotide]
fastas = ["04_MSA/merged_input/Selected/v1_Full/per_genome_gpe001970_and_Selected_Crop_Species_NUCLEOTIDE_Sequence.fasta"]

# Verified haploid-inducer DMP panel (Chapter II Table 1) merged with eggplant
# GPE001970 HMMER hits. Files generated by:
#   bash modules/04_multiple_sequence_alignment/build_v1_full_HI_DMPs.sh
# Re-run that script whenever the HI panel under I_RefSeqs/d_DMP_Query_Fasta/
# is updated; output writes back to the path below.
[alignment.input_sets.selected_v1_full_HI_DMPs_nucleotide]
fastas = ["04_MSA/merged_input/Selected/v1_Full/per_genome_gpe001970_and_HI_DMPs_NUCLEOTIDE_Sequence.fasta"]

[alignment.input_sets.selected_v1_full_HI_DMPs_amino_acid]
fastas = ["04_MSA/merged_input/Selected/v1_Full/per_genome_gpe001970_and_HI_DMPs_AMINO_ACID_Sequence.fasta"]

# Selected_Crop_Species + HI_DMPs union, deduplicated by sequence content.
# Counts at last build: AA 70 unique (from 79), NT 66 unique (from 77).
# Rebuild via: python3 c:/tmp/merge_dedup_fastas.py (or your preferred merger)
# whenever the v1_Full source FASTAs change.
[alignment.input_sets.selected_v3_full_and_HI_DMPs_nucleotide]
fastas = ["04_MSA/merged_input/Selected/v3_Full_and_HI_DMPs/per_genome_gpe001970_Full_and_HI_DMPs_NUCLEOTIDE_Sequence.fasta"]

[alignment.input_sets.selected_v3_full_and_HI_DMPs_amino_acid]
fastas = ["04_MSA/merged_input/Selected/v3_Full_and_HI_DMPs/per_genome_gpe001970_Full_and_HI_DMPs_AMINO_ACID_Sequence.fasta"]

# --- v4: per-paralog MSA inputs from BLAST lollipop groups ----------------
# One FASTA per anchor SmelDMP × sequence type. Each holds the anchor plus
# every BLAST hit whose Bit Score >= [blast_groups_msa].bitscore_threshold.
# Rebuild via:
#   bash modules/04_multiple_sequence_alignment/build_v4_blast_groups.sh
# Tweak [blast_groups_msa] below to change the threshold or paralog set.

[blast_groups_msa]
bitscore_threshold = 200
paralog_ids = [
    "SMEL5_01g008730.1",
    "SMEL5_01g026030.1",
    "SMEL5_02g013320.1",
    "SMEL5_04g005390.1",
    "SMEL5_10g003660.1",
    "SMEL5_10g017610.1",
    "SMEL5_12g005350.1",
]
output_dir = "04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200"

[alignment.input_sets.selected_v4_blast_groups_01g008730_nucleotide]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_01g008730.1_NUCLEOTIDE_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_01g008730_amino_acid]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_01g008730.1_AMINO_ACID_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_01g026030_nucleotide]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_01g026030.1_NUCLEOTIDE_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_01g026030_amino_acid]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_01g026030.1_AMINO_ACID_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_02g013320_nucleotide]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_02g013320.1_NUCLEOTIDE_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_02g013320_amino_acid]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_02g013320.1_AMINO_ACID_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_04g005390_nucleotide]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_04g005390.1_NUCLEOTIDE_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_04g005390_amino_acid]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_04g005390.1_AMINO_ACID_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_10g003660_nucleotide]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_10g003660.1_NUCLEOTIDE_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_10g003660_amino_acid]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_10g003660.1_AMINO_ACID_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_10g017610_nucleotide]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_10g017610.1_NUCLEOTIDE_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_10g017610_amino_acid]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_10g017610.1_AMINO_ACID_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_12g005350_nucleotide]
fastas = ["04_MSA/merged_input/Selected/v4_BLAST_Groups_bitscore200/SMEL5_12g005350.1_NUCLEOTIDE_Sequence.fasta"]

[alignment.input_sets.selected_v4_blast_groups_12g005350_amino_acid]
