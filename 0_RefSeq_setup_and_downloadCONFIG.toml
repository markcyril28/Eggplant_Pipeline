# Config for: 0_RefSeq_setup_and_download.sh
# Parsed by modules/utils/parse_toml.py (flat parser; arrays are index-aligned).

[pipeline]
# Operations run in order; comment out to skip.
operations = [
    "SETUP_DIRS",
    "EXTRACT_DMP_LOCAL",
    "DOWNLOAD_DMP_QUERIES",
    "MERGE_DMP_QUERIES",
    "DOWNLOAD_SMEL_UNITO",
    "EXTRACT_TRANSCRIPTS",
    "DOWNLOAD_CROP_GENOMES",
]

max_parallel         = "auto"   # CPU-bound jobs (gffread, merges); "auto" = $(nproc)
download_concurrency = "auto"   # NCBI eutils workers; "auto" = 1 (rate-limit safe)
overwrite            = false    # false = skip existing; true = re-download all
ncbi_api_key         = ""       # raises NCBI rate cap 3 -> 10 req/s

[output]
refseq_root          = "I_RefSeqs"
smel_subdir          = "a_Smel_RefSeqs"
crop_genomes_subdir  = "b_Various_Crop_Species_Genomes"
extra_genomes_subdir = "c_Extra_Genomes"
dmp_query_subdir     = "d_DMP_Query_Fasta"

# DMP query FASTA downloads. Arrays are index-aligned per species.
#   dirs[i]          subdir under output.dmp_query_subdir/
#   downloads[i]     module under modules/00_refseq/fasta_download/ ("" = skip)
#   merge_outputs[i] merged .fa filename ("" = skip merge)
[dmp_queries]
dirs = [
    "Arabidopsis_thaliana",
    "Zea_mays",
    "Ipomoea_batatas",
    "Solanum_lycopersicum",
    "Solanum_tuberosum",
    "Nicotiana_tabacum",
    "Brassica_napus",
    "Brassica_oleracea",
    "Brassica_juncea",
    "Citrullus_lanatus",
    "Cucumis_sativus",
    "Medicago_truncatula",
    "Glycine_max",
    "Gossypium_hirsutum",
    "Oryza_sativa",
    "Other_DMPs",
]
downloads = [
    "download_AtDMP_fasta.sh",
    "download_ZmDMPs_fasta.sh",
    "download_IpDMPs_fasta.sh",
    "download_SlDMP_fasta.sh",
    "download_StDMP_fasta.sh",
    "download_NtDMP_fasta.sh",
    "download_BnaDMP_fasta.sh",
    "download_BoDMP_fasta.sh",
    "download_BjuDMP_fasta.sh",
    "download_ClDMP_fasta.sh",
    "download_CsDMP_fasta.sh",
    "download_MtDMP_fasta.sh",
    "download_GmDMP_fasta.sh",
    "download_GhDMP_fasta.sh",
    "download_OsDMP_fasta.sh",
    "",
]
merge_outputs = [
    "AtDMPs_merged_fasta.fa",
    "ZmDMPs_merged_fasta.fa",
    "IpDMPs_merged_fasta.fa",
    "SlDMPs_merged_fasta.fa",
    "StDMPs_merged_fasta.fa",
    "NtDMPs_merged_fasta.fa",
    "BnaDMPs_merged_fasta.fa",
    "BoDMPs_merged_fasta.fa",
    "BjuDMPs_merged_fasta.fa",
    "ClDMPs_merged_fasta.fa",
    "CsDMPs_merged_fasta.fa",
    "MtDMPs_merged_fasta.fa",
    "GmDMPs_merged_fasta.fa",
    "GhDMPs_merged_fasta.fa",
    "OsDMPs_merged_fasta.fa",
    "OtherDMPs_merged_fasta.fa",
]

# Verified DMP HI registry. Drives EXTRACT_DMP_LOCAL: rows with
# source_mode=local are extracted from the named local genome; rows with
# source_mode=ncbi fall through to DOWNLOAD_DMP_QUERIES.
[dmp_registry]
path = "II_INPUTS/DMP_HI_registry.tsv"

# Solanum melongena Unito Genomics mirror (https://solgenomics.net/ftp/unito_genomics/)
[smel_unito]
downloader_path          = "a_Smel_RefSeqs/unito_genomics/download_unito_genomics.sh"
dest_subdir              = "a_Smel_RefSeqs/unito_genomics/unito_genomics_data"
extract_transcripts_path = "a_Smel_RefSeqs/unito_genomics/extract_transcripts.sh"

# Existing crop-species genome downloader (in I_RefSeqs/)
[crop_genomes]
downloader_path = "RefSeq_Downloader.sh"
