# ============================================================================
# Per-gene-group HMM profile mapping
# ----------------------------------------------------------------------------
# Each gene group declares a [.genes] table mapping gene name -> the list of
# HMM profiles that gene must hit. The orchestrator:
#   1. Auto-derives the flat profile set as the union of all gene entries.
#   2. Runs hmmsearch/nhmmer once per unique profile per genome.
#   3. For each gene, intersects per-profile hit IDs (logical AND across the
#      profiles listed) and emits gene-level FASTAs under d_GENES/<gene>/.
# A gene with a single profile passes through unchanged (no intersection).
# ============================================================================

[identification.gene_groups.DMP.genes]
DMP = ["II_INPUTS/1_HMMER_Inputs/a_HMM_Profiles/PF05078_DMP.hmm"]

[identification.gene_groups.HAP2.genes]
HAP2 = ["II_INPUTS/1_HMMER_Inputs/a_HMM_Profiles/PF10699_HAP2.hmm"]

[identification.gene_groups.GRF_GIF.genes]
# GRF must carry BOTH QLQ + WRC domains; GIF carries SSXT/SNH alone.
GRF = [
    "II_INPUTS/1_HMMER_Inputs/a_HMM_Profiles/PF08880_QLQ_Profile.hmm",  # QLQ domain
    "II_INPUTS/1_HMMER_Inputs/a_HMM_Profiles/PF08879_WRC_Profile.hmm",  # WRC domain
]

GIF = [
    "II_INPUTS/1_HMMER_Inputs/a_HMM_Profiles/PF05030_SSXT_Profile.hmm", # SSXT/SNH domain
]
