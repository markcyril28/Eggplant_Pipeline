# ============================================================================
# Protein Structure Color Configuration
# ============================================================================
# Central palette and rendering settings for PyMOL protein-structure figures.
#
# Referenced from:  config/{GROUP}/h_protein_structure_analysis.toml
# Parsed via:       modules/utils/parse_toml.py
#
# Color formats accepted:
#   PyMOL named color  →  "red", "green", "gray70", "slate"
#   RGB float array    →  [1.0, 0.0, 0.0]          (range 0–1)
#   Hex string         →  "#00BCD4"                  (per-protein only)
#
# Structural-element keys (consistent across gene groups):
#   tm_helices          Transmembrane / longest helix segments
#   other_helices       Non-TM helix segments
#   amphipathic_helices N-terminal amphipathic helices (DMP only)
#   beta_sheets         Beta-strand / sheet secondary structure
#   loops               Loops, coils, and turns
# ============================================================================


# ════════════════════════════════════════════════════════════════════════════
#  RENDERING DEFAULTS  (shared across all gene groups)
# ════════════════════════════════════════════════════════════════════════════

[rendering]
width        = 1200
height       = 1200
dpi          = 900
jpeg_quality = 95
ray_shadows  = false
specular     = 0.3
antialias    = 2
depth_cue    = true
zoom_buffer  = 20
backgrounds  = [
    "black",
    #"white",
]

# ── Orientation ─────────────────────────────────────────────────────────────
# "reference": superpose each protein onto reference_cif_file, then apply the
#              camera rotation extracted from reference_pse_file.  Falls back
#              to "pca" automatically when either file is absent.
# "pca":       PCA-based alignment only (helix principal axis → up, sheet → front).
orientation_method = "reference"
reference_pse_file = "reference.pse"  # filename looked up inside AlphaFold3_Results/
reference_cif_file = "reference.cif"  # filename looked up inside AlphaFold3_Results/
helix_up           = false            # PCA fallback: false = helix axis → −Y (down; ectodomain up)
slab_depth         = 200              # clipping half-depth from camera centre (Å)
invert_orientation = true             # flip 180° around X after orientation (HAP2 trimer + DMP complex was rendering upside-down)


# ════════════════════════════════════════════════════════════════════════════
#  CONFIDENCE  — AlphaFold pLDDT coloring (B-factor column in PDB files)
# ════════════════════════════════════════════════════════════════════════════
# Bands (low → high): very_low ≤ t1 < low ≤ t2 < high ≤ t3 < very_high
# Standard AlphaFold colour scheme; override individual colours here.

[confidence]
thresholds = [50, 70, 90]
very_high  = [0.00, 0.33, 0.84]   # pLDDT > 90  — deep blue
high       = [0.40, 0.80, 0.95]   # 70 < pLDDT ≤ 90 — cyan
low        = [1.00, 0.86, 0.07]   # 50 < pLDDT ≤ 70 — yellow
very_low   = [1.00, 0.49, 0.27]   # pLDDT ≤ 50 — orange


# ════════════════════════════════════════════════════════════════════════════
#  DMP  — Warm palette for 4-TM-helix transporters
# ════════════════════════════════════════════════════════════════════════════
#
# Topology:  N-loop → amphipathic helix → TM1 → TM2
#            → extracellular sheet domain → TM3 → TM4 → C-terminus
#
# Topology-aware coloring (render_structures.py) partitions helices
# relative to the central sheet region:
#   • Last 2 helix groups before sheets  → TM1, TM2
#   • Last 2 helix groups after  sheets  → TM3, TM4
#   • Remaining N-terminal helices        → amphipathic
#   • Region between TM2 and TM3         → extracellular domain
#   • Everything else                     → loops

# ── Primary palette (warm) ──────────────────────────────────────────────────

[DMP]
tm_helices           = [0.83, 0.19, 0.02]   # deep orange-red (#D43005)
amphipathic_helices  = [0.85, 0.65, 0.13]   # golden amber
extracellular_domain = [1.00, 0.70, 0.40]   # warm peach
loops                = "gray70"

[DMP.color_versions]
names = [
    "original", 
    "contrast", 
    "interaction", 
    "confidence"
]

# ── Topology partitioning ───────────────────────────────────────────────────

[DMP.topology]
description      = "4 TM helices flank a central extracellular sheet domain"
helix_merge_gap  = 2   # merge helix segments separated by ≤ N residues
tm_before_sheets = 2   # helix groups before sheets assigned as TM
tm_after_sheets  = 2   # helix groups after  sheets assigned as TM

[DMP.topology.fallback]               # used when topology detection fails
all_helices = [0.83, 0.19, 0.02]      # deep orange-red (#D43005)  (= tm_helices)
all_sheets  = [1.00, 0.70, 0.40]      # peach  (= extracellular_domain)

# ── Structural elements (N→C order) ────────────────────────────────────────
# Describes the biological domains of DMP (DUF679 family).
# Detection is algorithmic via DSSP, not by fixed residue positions.
# These annotations serve as documentation and for figure legends.

[DMP.topology.elements.n_terminal_loop]
order          = 1
ss_type        = "loop"
color_key      = "loops"
label          = "N-terminal loop"
description    = "Disordered N-terminal region preceding the amphipathic helix"

[DMP.topology.elements.amphipathic_helix]
order          = 2
ss_type        = "helix"
color_key      = "amphipathic_helices"
label          = "Amphipathic helix (alpha1-alpha2)"
description    = "N-terminal helical region; mediates physical interaction with HAP2/GCS1; functionally critical for gamete fusion"
detection      = "Helix groups N-terminal to TM1-TM2 (before the sheet region)"

[DMP.topology.elements.beta_sheet]
order          = 3
ss_type        = "sheet"
color_key      = "extracellular_domain"
label          = "Beta-pleated sheet region"
description    = "Central beta-strand domain connecting N-terminal and TM regions; high sequence conservation; structural spacer maintaining spatial relationship between amphipathic and TM domains"
detection      = "All residues with DSSP assignment 'S' (strand); defines the sheet_min–sheet_max boundary"

[DMP.topology.elements.tm_helix_1]
order          = 4
ss_type        = "helix"
color_key      = "tm_helices"
label          = "TM1 (alpha4)"
description    = "First transmembrane helix; immediately precedes the sheet region"
detection      = "Second-to-last helix group before sheet_min"

[DMP.topology.elements.tm_helix_2]
order          = 5
ss_type        = "helix"
color_key      = "tm_helices"
label          = "TM2 (alpha5 N-half)"
description    = "Second transmembrane helix; directly flanks the sheet region on the N-terminal side"
detection      = "Last helix group before sheet_min"

[DMP.topology.elements.tm_helix_3]
order          = 6
ss_type        = "helix"
color_key      = "tm_helices"
label          = "TM3 (alpha5 C-half)"
description    = "Third transmembrane helix; directly flanks the sheet region on the C-terminal side"
detection      = "First helix group after sheet_max"

[DMP.topology.elements.tm_helix_4]
order          = 7
ss_type        = "helix"
color_key      = "tm_helices"
label          = "TM4 (alpha6)"
description    = "Fourth transmembrane helix; most C-terminal TM segment"
detection      = "Second helix group after sheet_max"

[DMP.topology.elements.c_terminal]
order          = 8
ss_type        = "loop"
color_key      = "loops"
label          = "C-terminal tail"
description    = "Region after TM4; contains highly conserved sequence stretches"

# ── Contrast palette (classic red / slate / yellow) ─────────────────────────

[DMP.contrast]
tm_helices           = [0.83, 0.19, 0.02]   # deep orange-red (#D43005)
amphipathic_helices  = "slate"
extracellular_domain = "yellow"
loops                = "gray70"

[DMP.contrast.topology.fallback]
all_helices = [0.83, 0.19, 0.02]   # deep orange-red (#D43005)
all_sheets  = "yellow"

# ── Interaction palette (warm — matches DMP chain in DMP-HAP2 complex) ──────

[DMP.interaction]
transmembrane_helices            = [0.83, 0.19, 0.02]   # deep orange-red (#D43005)
N-terminal_domain                = [0.85, 0.65, 0.13]   # golden amber
extracellular_beta_pleated_sheet = [0.96, 0.87, 0.70]   # beige
loops                            = "gray70"

[DMP.interaction.topology.fallback]
all_helices = [0.83, 0.19, 0.02]      # deep orange-red (#D43005)  (= tm_helices)
all_sheets  = [0.96, 0.87, 0.70]      # beige   (= extracellular_domain)


# ════════════════════════════════════════════════════════════════════════════
#  HAP2  — Cool palette
# ════════════════════════════════════════════════════════════════════════════

# ── Primary palette (cool) ──────────────────────────────────────────────────

[HAP2]
tm_helices    = [0.00, 0.55, 0.55]   # deep teal
other_helices = [0.50, 0.35, 0.76]   # periwinkle
beta_sheets   = [0.36, 0.53, 0.75]   # steel blue
loops         = "gray70"

[HAP2.color_versions]
names = ["original", "contrast", "interaction", "confidence"]

# ── Contrast palette (classic green / mauve / amber) ────────────────────────

[HAP2.contrast]
tm_helices    = "green"
other_helices = [0.88, 0.60, 0.70]   # muted mauve
beta_sheets   = [0.88, 0.47, 0.21]   # warm amber
loops         = "gray70"

# ── Interaction palette (cool — matches HAP2 chains in DMP-HAP2 complex) ───

[HAP2.interaction]
tm_helices    = [0.00, 0.55, 0.55]   # deep teal
other_helices = [0.50, 0.35, 0.76]   # periwinkle
beta_sheets   = [0.36, 0.53, 0.75]   # steel blue
loops         = "gray70"


# ════════════════════════════════════════════════════════════════════════════
#  DMP-HAP2  — Complex interaction (HAP2 trimer + DMP monomer)
# ════════════════════════════════════════════════════════════════════════════
# Chain assignment:  A/B/C = HAP2 trimer,  D = DMP monomer
# Each chain inherits its gene group's palette ([HAP2] or [DMP]).

[DMP-HAP2]
hap2_chains       = ["A", "B", "C"]
dmp_chains        = ["D"]
n_tm_helices_hap2 = 4   # top-N longest helices per HAP2 chain → TM

# "original" = default palettes;  "contrast" = warm DMP vs cool HAP2;  "interaction" = interaction-domain palette
[DMP-HAP2.color_versions]
names = [
    "original",
    "contrast",
    "interaction",
    "confidence",
]



# ════════════════════════════════════════════════════════════════════════════
#  COMPARISON OVERLAY  — AF3 vs SWISS-MODEL overlay render (Op 8)
# ════════════════════════════════════════════════════════════════════════════
# Read by comparative_render.py via --color-config.
# af3_color / swiss_color accept any PyMOL named colour or hex string.

[comparison]
af3_color          = "salmon"   # colour for the AlphaFold3 structure
swiss_color        = "palecyan" # colour for the SWISS-MODEL structure
swiss_transparency = 0.20       # cartoon transparency for SWISS chain (0.0=opaque, 1.0=invisible)
zoom_buffer        = 10         # buffer pixels around the superposed complex during zoom


# ════════════════════════════════════════════════════════════════════════════
#  GRF_GIF  — Per-protein hex colors (legacy)
# ════════════════════════════════════════════════════════════════════════════
# Used by legacy PyMOL modules (pymol_config*.py, visualize_gif_grf.py).
# Each protein chain gets a distinct color with darker highlight variants.

[GRF_GIF]
SmelGRF  = "#00BCD4"   # cyan
SmelGIF  = "#673AB7"   # purple
SmelSWI2 = "#4CAF50"   # green

[GRF_GIF.highlight_stick]             # darker — for residue stick highlights
SmelGRF  = "#008BA3"   # dark cyan
SmelGIF  = "#4A148C"   # dark purple
SmelSWI2 = "#2E7D32"   # dark green

[GRF_GIF.highlight_bubble]            # medium-dark — for residue bubble highlights
SmelGRF  = "#00A5BB"   # medium-dark cyan
SmelGIF  = "#5E35B1"   # medium-dark purple
SmelSWI2 = "#388E3C"   # medium-dark green
