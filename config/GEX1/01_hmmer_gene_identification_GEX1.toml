# ============================================================================
# Eggplant Pipeline Configuration: GEX1 — 01_Identification (HMMER)
# ============================================================================
# Gene-group overrides only. Shared defaults (method, db_type, targets,
# hmmer_params, nhmmer_params, cdhit_params, cdhit_est_params) live in
# 01_hmmer_identifyCONFIG.toml (project root) and are deep-merged.
# HMM profile is declared in 01_hmmer_identifyCONFIG.toml under
# [identification.gene_groups.GEX1].
#
# Profile: PANTHER PTHR33538 (GEX1/Brambleberry/Kar5 family)
# PANTHER HMMs carry no GA thresholds, so use_ga is forced off here via
# deep-merge override. The family is eukaryote-wide (not plant-specific);
# post-filter hmmsearch hits to Viridiplantae if a plant-restricted result
# set is needed.
# ============================================================================

[identification.hmmer_params]
# PANTHER PTHR33538 has no GA thresholds — override shared use_ga = true.
use_ga = false
