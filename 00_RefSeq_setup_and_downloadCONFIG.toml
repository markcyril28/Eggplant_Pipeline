# ─────────────────────────────────────────────────────────────────────────────
# REGISTRY & PHYTOZOME
# ─────────────────────────────────────────────────────────────────────────────

# Verified DMP HI registry. Drives EXTRACT_DMP_LOCAL: rows with
# source_mode=local are extracted from the named local genome; rows with
# source_mode=ncbi fall through to DOWNLOAD_DMP_HI_GENES.
[dmp_registry]
path = "II_INPUTS/DMP_HI_registry.tsv"

# Phytozome / JGI Genome Portal  (https://phytozome-next.jgi.doe.gov/)
# Required for species whose published locus IDs are Phytozome-specific and
# are not indexed in NCBI nuccore. The portal codes below are the *short*
# names accepted by the get-directory ext-api (verified empirically):
#   Glycine max         Glyma.18G IDs   ->  Gmax
#   Cucumis sativus     CsaV3_ IDs      ->  Csativus
#   Citrullus lanatus   Cla97 IDs       ->  Clanatus
#   Solanum tuberosum   Soltu.DM IDs    ->  Stuberosum   (NCBI gene DB tried first)
#   Oryza sativa        LOC_Os IDs      ->  Osativa      (NCBI gene DB tried first)
#   Gossypium hirsutum  Gh_A/D IDs      ->  Ghirsutum    (CottonGen mirror)
#   Ipomoea batatas     Ibatatas IDs    ->  Ibatatas
#
# Set credentials here, or export JGI_USER / JGI_PASSWORD in the shell before
# running the stage. If both are absent the Phytozome steps are skipped and the
# scripts fall back to NCBI gene DB where possible.
[phytozome]
jgi_user     = "mrmercado3@up.edu.ph"   # JGI account email
jgi_password = ""   # JGI account password

# Solanum melongena Unito Genomics mirror (https://solgenomics.net/ftp/unito_genomics/)
[smel_unito]
downloader_path          = "a_Smel_RefSeqs/unito_genomics/download_unito_genomics.sh"
dest_subdir              = "a_Smel_RefSeqs/unito_genomics/unito_genomics_data"
extract_transcripts_path = "a_Smel_RefSeqs/unito_genomics/extract_transcripts.sh"

# Existing crop-species genome downloader (in I_RefSeqs/)
[crop_genomes]
downloader_path = "RefSeq_Downloader.sh"
