# ============================================================================
# Eggplant Pipeline Configuration: DMP - 02_BLAST_Alignment (per-group)
# ============================================================================
# This file holds only DMP-unique BLAST query inputs. All other [ortholog_blast]
# keys (operations, BLASTn/x/p params, target_* paths, use_hmmer_output) and
# the entire [blast_visualize] section live in the shared root config
# 02_blast_alignmentCONFIG.toml. The orchestrator merges shared-then-per-group,
# so per-group keys override shared. Add a key here only when DMP needs a
# different value from the shared default.
# ============================================================================

[ortholog_blast]

# Query FASTAs -- 14 verified DMP haploid-inducer species (Chapter II Table 1).
# Sources resolved 2026-04-26 from NCBI RefSeq (XM_*) and Ensembl Plants;
# downloaded by 00_RefSeq_setup_and_download.sh (DOWNLOAD_DMP_HI_GENES) and
# concatenated by MERGE_DMP_HI_GENES into the per-species *_merged*.fa file.
# See II_INPUTS/DMP_HI_registry.tsv for the locus_id -> accession mapping.
query_fastas = [
    "I_RefSeqs/d_DMP_Query_Fasta/Arabidopsis_thaliana/AtDMPs_merged_fasta.fa",       # AtDMP8 + AtDMP9   (Zhong 2020)
    "I_RefSeqs/d_DMP_Query_Fasta/Zea_mays/ZmDMPs_v2_merged_fasta.fa",                # ZmDMP family       (Zhong 2019)
    "I_RefSeqs/d_DMP_Query_Fasta/Solanum_lycopersicum/SlDMPs_merged.fa",             # SlDMP3             (Zhong 2022b)
    "I_RefSeqs/d_DMP_Query_Fasta/Solanum_tuberosum/StDMPs_merged.fa",                # StDMP              (J. Zhang 2022)
    "I_RefSeqs/d_DMP_Query_Fasta/Nicotiana_tabacum/NtDMPs_merged.fa",                # NtDMP1-3 panel     (X. Zhang 2022)
    "I_RefSeqs/d_DMP_Query_Fasta/Brassica_napus/BnaDMPs_merged.fa",                  # BnaDMP A03/C03/A04/C04 (Y. Li 2022)
    "I_RefSeqs/d_DMP_Query_Fasta/Brassica_oleracea/BoDMPs_merged.fa",                # BoC03.DMP9         (Zhao 2022)
    "I_RefSeqs/d_DMP_Query_Fasta/Brassica_juncea/BjuDMPs_merged.fa",                 # BjuDMP1-4          (Chu 2025)
    "I_RefSeqs/d_DMP_Query_Fasta/Citrullus_lanatus/ClDMPs_merged.fa",                # ClDMP3             (Chen 2023)
    "I_RefSeqs/d_DMP_Query_Fasta/Cucumis_sativus/CsDMPs_merged.fa",                  # CsDMP              (Yin 2024)
    "I_RefSeqs/d_DMP_Query_Fasta/Medicago_truncatula/MtDMPs_merged.fa",              # MtDMP8 + MtDMP9    (N. Wang 2022)
    "I_RefSeqs/d_DMP_Query_Fasta/Glycine_max/GmDMPs_merged.fa",                      # GmDMP1 + GmDMP2    (Zhong 2024)
    "I_RefSeqs/d_DMP_Query_Fasta/Gossypium_hirsutum/GhDMPs_merged.fa",               # GhDMPa + GhDMPd    (Long 2024)
    "I_RefSeqs/d_DMP_Query_Fasta/Oryza_sativa/OsDMPs_merged.fa",                     # OsDMP1 + OsDMP3    (Liang 2025)
    # ── Older/historical inputs (II_INPUTS/DMP_query_fasta_file/) ──────────────
    # Cross-species DMP panels from 2024_Paper_DMPs and per-species working dirs.
    # Adds 8 gap species (Pp, Si, Ma, Pt, Bd, Gr, Ca, Ib) not present in
    # 1_RefSeqs/d_DMP_Query_Fasta/. Skipped: empty files (Ac, Sb), duplicates of
    # already-configured species (Sl, Gm), and Citrus sinensis (Cs prefix would
    # collide with Cucumis sativus already used in this run).
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_1_Physcomitrella_patens/PpDMPs_merged_fasta.fa",   # Pp - moss outgroup
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_1_Setaria_italica/SiDMPs_merged_fasta.fa",         # Si - foxtail millet
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_3_Musa_acuminata/MaDMPs_merged_fasta.fa",          # Ma - banana
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_4_Populus_trichocarpa/PtDMPs_merged_fasta.fa",     # Pt - black cottonwood
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_5_Brachypodium_distachyon/BdDMPs_merged_fasta.fa", # Bd - purple false brome
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_5_Gossypium_raimondii/GrDMPs_merged_fasta.fa",     # Gr - D-genome cotton
    "II_INPUTS/DMP_query_fasta_file/Capsicum_annuum_Pepper/CaDMPs_nuc_seq_merged.fasta",                     # Ca - pepper (7 CaDMPs)
    "II_INPUTS/DMP_query_fasta_file/Ipomea_batatas/IpDMPs_merged_fasta.fa",                                  # Ib - sweetpotato (note: dir name "Ipomea" is a typo retained verbatim)
]

# Protein queries -- frame-1 translations of the CDS files above (generated by
# the merge stage). Used by blastp against the Smel HMMER hits subject DB.
# Order and set must mirror query_fastas so blastp results align to the same
# species panel as blastn.
query_protein_fastas = [
    "I_RefSeqs/d_DMP_Query_Fasta/Arabidopsis_thaliana/AtDMPs_merged_protein.fa",
    "I_RefSeqs/d_DMP_Query_Fasta/Zea_mays/ZmDMPs_v2_merged_protein.fa",
