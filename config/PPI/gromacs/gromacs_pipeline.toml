# ==============================================================================
# GROMACS Unified Pipeline Configuration
#
# PURPOSE: Orchestrate all 5 GROMACS PPI analysis steps in sequence.
#          Steps progress from fast screening (EM) to full MD simulations:
#
#   1. quick_stability         — EM-only static metrics (GPU+CPU, minutes)
#   2. compare_chain_stability — Full MD + interaction energy (GPU, hours)
#   3. interface_analysis      — EM-based interface characterisation (GPU+CPU, minutes)
#   4. batch_comparison        — Rank all structures in a dataset (GPU+CPU, minutes)
#   5. production_md           — Long MD with full GPU offload (GPU, hours–days)
#   6. visualize_results       — (Re)generate plots & viz scripts (CPU-only, seconds)
#
# TYPICAL WORKFLOW:
#   Run Step 4 first to screen → pick best structures → run Steps 1+3 for
#   detailed interface → run Step 2 or 5 for dynamics + stability.
#
# Edit the [pipeline] section to control which steps run and in what order.
# Each step has its own [step.*] section for per-step overrides.
# Common defaults are loaded from common.toml automatically.
#
# Usage: ./run_gromacs_pipeline.sh [--steps step1,step2,...] [--dry-run]
# ==============================================================================

[pipeline]
# Steps to run, in order. Comment out or remove to skip a step.
# Available: "quick_stability", "compare_chain_stability", "interface_analysis", "batch_comparison", "production_md", "visualize_results"
steps = [
    "quick_stability",
    "compare_chain_stability",
    "interface_analysis",
    "batch_comparison",
    "production_md",
    "visualize_results",
]

# If true, stop the entire pipeline on the first step failure
stop_on_error = false

# Auto-generate a timestamped run directory under output_base
auto_timestamp_dir = true


# ==============================================================================
# STRUCTURES — loaded from config/<GENE_GROUP>/h_protein_structure_analysis.toml
# ([ppi_structures].active). Per-step overrides still available below.
# ==============================================================================

# [structures]
# Moved to config/DMP-HAP2/h_protein_structure_analysis.toml [ppi_structures]


# ==============================================================================
# STEP 1 — Quick Stability Comparison (GPU+CPU)
# ==============================================================================

[step.quick_stability]
enabled           = true
override_existing = false
box_distance      = 1.5
em_steps          = 50000
gpu_id            = 0
max_threads       = 8

# Uncomment to use different structures for this step only:
# [step.quick_stability.structures]
# active = [
#     "SmelGRF-GIF/fold_1_x_1_model_0.pdb",
#     "SmelGRF-GIF/fold_2_x_1_model_0.pdb",
# ]


# ==============================================================================
# STEP 2 — Compare Chain Stability (GPU)
# ==============================================================================

[step.compare_chain_stability]
enabled           = true
override_existing = false
mode              = "full"   # full | sim-only | viz-only | compare-only
box_distance      = 1.5
ion_concentration = 0.15
em_steps          = 50000
nvt_steps         = 100000   # 200 ps
npt_steps         = 100000   # 200 ps
md_steps          = 5000000  # 10 ns
gpu_id            = 0
max_threads       = 12
mdrun_option      = "Option_A"

# Uncomment to use different structures for this step only:
# [step.compare_chain_stability.structures]
# active = [...]


# ==============================================================================
# STEP 3 — Interface Analysis (GPU+CPU)
# ==============================================================================

[step.interface_analysis]
enabled           = true
override_existing = false
box_distance      = 1.5
em_steps          = 50000
gpu_id            = 0
max_threads       = 12

# Uncomment to use different structures for this step only:
# [step.interface_analysis.structures]
# active = [
#     "SmelGRF-GIF/fold_1_x_1_model_0.pdb",
#     "SmelGRF-GIF/fold_2_x_1_model_0.pdb",
#     "SmelGIF-SWI2/SmelGIF-SWI2.pdb",
# ]


# ==============================================================================
# STEP 4 — Batch Comparison (GPU+CPU)
# ==============================================================================

[step.batch_comparison]
enabled           = true
override_existing = false
em_steps          = 50000
box_distance      = 1.5
box_type          = "cubic"
gpu_id            = 0
max_threads       = 12

[step.batch_comparison.datasets]
# Dataset folder names (subdirs of paths.input_base)
# NOTE: CIF files are nested in subdirs; batch_comparison uses maxdepth 1.
# To batch-compare all DMP-HAP2 structures, copy/symlink CIFs to a flat dir.
active = [
    # "SmelGRF-GIF",
    # "SmelDMP",
    # "SmelGIF-SWI2",
]


# ==============================================================================
# STEP 5 — Production MD (Full GPU Offload)
#
# Runs:  gmx mdrun -deffnm md -v -maxh <max_hours> -ntmpi 1
#                   -nb gpu -pme gpu -bonded gpu -update gpu
# EM:    gmx mdrun -deffnm em -v -ntmpi 1
#                   -nb gpu -pme cpu -bonded gpu
# ==============================================================================

[step.production_md]
enabled           = true
override_existing = false
mode              = "full"   # full | sim-only | md-only
box_distance      = 1.2
ion_concentration = 0.15
em_steps          = 5000
nvt_steps         = 50000    # 100 ps
npt_steps         = 50000    # 100 ps
md_steps          = 250000   # 500 ps
gpu_id            = 0
max_threads       = 12
max_hours         = 5000     # wall-clock hour limit for production MD (-maxh)

# Uncomment to use different structures for this step only:
# [step.production_md.structures]
# active = [...]


# ==============================================================================
# STEP 6 — Visualize Results (CPU-only, post-processing)
#
# Re-generates plots, visualization scripts, and statistics from existing
# simulation outputs (steps 1–5). No GROMACS runs or GPU needed.
# ==============================================================================

[step.visualize_results]
enabled           = true
override_existing = false
dpi               = 600
plot_format       = "png"    # png | svg | pdf
max_contact_pairs = 50
generate_pymol    = true
generate_vmd      = true
generate_chimerax = true

# Limit to specific source steps; comment out to process all found outputs
# [step.visualize_results.source_steps]
# active = ["compare_chain_stability", "interface_analysis", "production_md"]
