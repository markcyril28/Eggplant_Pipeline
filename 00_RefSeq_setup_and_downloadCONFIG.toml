]
downloads = [
    "download_IpDMPs_fasta.sh",
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/Capsicum_annuum_Pepper/
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_1_Physcomitrella_patens/
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_1_Setaria_italica/
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_2_Ananas_comosus/
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_3_Musa_acuminata/
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_4_Populus_trichocarpa/
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_5_Brachypodium_distachyon/
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_5_Gossypium_raimondii/
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_5_Sorghum_bicolor/
    "",   # assembled manually; merged by legacy script
]
merge_outputs = [
    "IpDMPs_merged.fa",
    "CaDMPs_merged.fa",
    "PpDMPs_merged.fa",
    "SiDMPs_merged.fa",
    "AcDMPs_merged.fa",
    "MaDMPs_merged.fa",
    "PtDMPs_merged.fa",
    "BdDMPs_merged.fa",
    "GrDMPs_merged.fa",
    "SbDMPs_merged.fa",
    "OtherDMPs_merged.fa",
