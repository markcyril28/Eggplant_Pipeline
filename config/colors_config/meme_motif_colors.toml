    "#D9A621",   #  2  golden amber
    "#FFA347",   #  3  warm peach-orange
    "#C74375",   #  4  raspberry
    "#F0C75E",   #  5  saffron gold
    "#B35900",   #  6  burnt sienna
    "#E88C6A",   #  7  salmon
    "#A0522D",   #  8  sienna brown
    "#FF6F61",   #  9  living coral
    "#8B4513",   # 10  saddle brown
]


