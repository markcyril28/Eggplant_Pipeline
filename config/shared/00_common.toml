# ============================================================================
# Shared Pipeline Configuration — Common / Shared Defaults
# ============================================================================
# Settings here apply to ALL gene groups.  Gene-group-specific overrides
# (e.g. [general] gene_group, base_dir) live in config/{GROUP}/00_common.toml
# and are deep-merged on top of these defaults at runtime.
# ============================================================================

[output_dirs]
identification     = "01_Identification"
blast_alignment    = "02_BLAST_Alignment"
msa                = "04_MSA"
phylogenetics      = "05_Phylogenetics"
gene_sequence      = "06_Motif_Analysis"    # legacy key name — consumed by f_motif_analysis.sh
gene_expression    = "06_Gene_Expression"
plantcare          = "07_PlantCARE_Analysis"
protein_structure  = "08_Protein_Structure"
crispr             = "09_CRISPR"

# ============================================================================
# Reference Genomes and Databases
# ============================================================================
[reference]
eggplant_v4_1_genome      = "I_RefSeqs/a_Smel_RefSeqs/Solanum_melongena_v4.1/Eggplant_V4.1.fa"
eggplant_v4_1_transcripts = "I_RefSeqs/a_Smel_RefSeqs/Solanum_melongena_v4.1/Eggplant_V4.1_transcripts.function.fa"
eggplant_v4_1_proteins    = "I_RefSeqs/a_Smel_RefSeqs/Solanum_melongena_v4.1/Eggplant_V4.1_protein.function.fa"
eggplant_v4_1_cds         = "I_RefSeqs/a_Smel_RefSeqs/Solanum_melongena_v4.1/Eggplant_V4.1_cds.fa"

# ==========================================================================
# Shared MSA Query FASTA Selection
# ==========================================================================
[msa_query_selection]
nucleotide_query_fastas_key = "query_fastas"
amino_acid_query_fastas_key = "query_protein_fastas"
