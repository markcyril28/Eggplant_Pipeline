# ============================================================================
# Eggplant Pipeline Configuration: DMP — 02_BLAST_Alignment
# ============================================================================

[ortholog_blast]
# ── Operations ────────────────────────────────────────────────────────────────
# Comment in/out to select which stages run.  All run by default when absent.
operations = [
    "blastn",               # BLASTn: nucleotide query vs nucleotide DB (identification + ortholog)
    #"blastx",              # BLASTx: nucleotide query vs protein DB (translated ortholog)
    "blastp",               # BLASTp: protein query vs protein DB (ortholog alignment)
    "visualize_heatmap",        # Fig 1  — cross-species % identity heatmap
    "visualize_heatmap_evalue", # Fig 1b — % identity + E-value overlay heatmap
    "visualize_lollipop",       # Fig 3  — per-gene top-hits lollipop (Bit Score)
]

# BLASTn Identification
blastn_e_value = "1e-10"
blastn_word_size = 11
blastn_max_target_seqs = 500
blastn_max_hsps = 1
blastn_perc_identity = 0
blastn_qcov_hsp_perc = 0
blastn_task = "blastn"
blastn_dust = "yes"

# BLASTx Ortholog Alignment (translated nucleotide query vs protein DB)
blastx_e_value = "1e-15"
blastx_word_size = 3
blastx_max_target_seqs = 500
blastx_max_hsps = 1
blastx_qcov_hsp_perc = 0
blastx_matrix = "BLOSUM62"
blastx_seg = "yes"

# BLASTp Search (protein query vs protein DB)
blastp_e_value = "1e-15"
blastp_word_size = 2
blastp_max_target_seqs = 500
blastp_max_hsps = 1
blastp_qcov_hsp_perc = 0
blastp_matrix = "BLOSUM62"
blastp_seg = "yes"

# Target genomes — comment in/out matching quadruplets (label, genome, protein, transcript)
target_labels = [
    "Solanum_melongena_v4.1",
    #"Solanum_melongena_V3",
    "GPE001970_SMEL5",
]

target_genomes = [
    "I_RefSeqs/a_Smel_RefSeqs/Solanum_melongena_v4.1/Eggplant_V4.1",
    #"I_RefSeqs/a_Smel_RefSeqs/Solanum_melongena_consortium/assembly/V3/Eggplant_V3",
    "I_RefSeqs/a_Smel_RefSeqs/unito_genomics/genomes/GPE001970",
]

target_proteins = [
    "I_RefSeqs/a_Smel_RefSeqs/Solanum_melongena_v4.1/Eggplant_V4.1_protein.function.fa",
    #"I_RefSeqs/a_Smel_RefSeqs/Solanum_melongena_consortium/assembly/V3/Eggplant_V3.protein.putative_function.fa",
    "I_RefSeqs/a_Smel_RefSeqs/unito_genomics/transcripts/GPE001970_proteins.fa",
