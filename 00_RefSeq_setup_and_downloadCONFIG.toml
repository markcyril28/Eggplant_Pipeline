# Config for: 00_RefSeq_setup_and_download.sh

[pipeline]
# Operations run in order; comment out to skip.
operations = [
    "SETUP_DIRS",
    "EXTRACT_DMP_LOCAL",
    "DOWNLOAD_DMP_HI_GENES",      # 14 verified haploid-inducer species (HIR table)
    "MERGE_DMP_HI_GENES",
    "DOWNLOAD_DMP_FAMILY",         # broader DMP gene family for phylogenetic context
    "MERGE_DMP_FAMILY",
    "DOWNLOAD_SMEL_UNITO",
    "EXTRACT_TRANSCRIPTS",
    "DOWNLOAD_CROP_GENOMES",
    "DOWNLOAD_HIR_GENOME_ASSEMBLIES",  # full genome assemblies per Table 2 (Chapter II)
]

max_parallel         = "auto"   # CPU-bound jobs (gffread, merges); "auto" = $(nproc)
download_concurrency = "auto"   # NCBI eutils workers; "auto" = 1 (rate-limit safe)
overwrite            = false    # false = skip existing; true = re-download all
ncbi_api_key         = ""       # raises NCBI rate cap 3 -> 10 req/s

[output]
refseq_root          = "I_RefSeqs"
smel_subdir          = "a_Smel_RefSeqs"
crop_genomes_subdir  = "b_Various_Crop_Species_Genomes"
extra_genomes_subdir = "c_Extra_Genomes"
dmp_query_subdir     = "d_DMP_Query_Fasta"

# ─────────────────────────────────────────────────────────────────────────────
# DMP HAPLOID-INDUCER GENES  (14 verified species from HIR table)
# ─────────────────────────────────────────────────────────────────────────────
# Arrays are index-aligned per species.
#   dirs[i]          subdir under output.dmp_query_subdir/
#   downloads[i]     module under modules/00_refseq/fasta_download/ ("" = skip)
#   merge_outputs[i] merged .fa filename ("" = skip merge)
#
# Fetch priority per species:
#   At, Sl     local CDS (EXTRACT_DMP_LOCAL)
#   Zm, Bna,
#   Mt         NCBI nuccore by locus ID
#   St, Nt,
#   Bo, Bju    NCBI Gene DB (locus/symbol not in nuccore directly)
#   Gm, Cl, Cs Phytozome primary (Glyma/Cla97/CsaV3 IDs); NCBI Gene DB fallback
#   Gh         CottonGen ZJU-improved v2.1 IDs (Gh_AxxGxxxx format from Long et al., 2024)
#   Os         NCBI nuccore by MSU7 locus (LOC_Os format)
#
# Canonical reference assemblies per Table 2 (Chapter II, Review of Literature):
#   Zea mays              B73 RefGen_v4                       (MaizeGDB)
#   Arabidopsis thaliana  TAIR10                              (TAIR)
#   Solanum lycopersicum  SL3.0 / ITAG3.2                     (Sol Genomics Network)
#   Solanum tuberosum     DM v6.1                             (Spud DB)
#   Nicotiana tabacum     Nitab4.5                            (Sol Genomics Network)
#   Brassica napus        Darmor-bzh v4.1, annotation v5      (BnaOmics / Genoscope)
#   Brassica oleracea     TO1000DH3 v1.0                      (BnaOmics / Ensembl Plants)
#   Brassica juncea       T84-66 AABB chromosome-scale        (Paritosh et al., 2021)
#   Citrullus lanatus     97103 v2                            (Cucurbit Genomics Database)
#   Cucumis sativus       Chinese Long v3                     (Cucurbit Genomics Database)
#   Medicago truncatula   Mt4.0v1                             (Phytozome)
#   Glycine max           Williams 82 Wm82.a2.v1              (Phytozome / SoyBase)
#   Gossypium hirsutum    TM-1 ZJU-improved v2.1              (CottonGen)
#   Oryza sativa          Nipponbare MSU Release 7            (Rice Genome Annotation Project)
[dmp_hi_genes]
dirs = [
    "Arabidopsis_thaliana",
    "Zea_mays",
    "Solanum_lycopersicum",
    "Solanum_tuberosum",
    "Nicotiana_tabacum",
    "Brassica_napus",
    "Brassica_oleracea",
    "Brassica_juncea",
    "Citrullus_lanatus",
    "Cucumis_sativus",
    "Medicago_truncatula",
    "Glycine_max",
    "Gossypium_hirsutum",
    "Oryza_sativa",
]
downloads = [
    "download_AtDMP_fasta.sh",
    "download_ZmDMPs_fasta.sh",
    "download_SlDMP_fasta.sh",
    "download_StDMP_fasta.sh",
    "download_NtDMP_fasta.sh",
    "download_BnaDMP_fasta.sh",
    "download_BoDMP_fasta.sh",
    "download_BjuDMP_fasta.sh",
    "download_ClDMP_fasta.sh",
    "download_CsDMP_fasta.sh",
    "download_MtDMP_fasta.sh",
    "download_GmDMP_fasta.sh",
    "download_GhDMP_fasta.sh",
    "download_OsDMP_fasta.sh",
]
merge_outputs = [
    "AtDMPs_merged_fasta.fa",
    "ZmDMPs_v2_merged_fasta.fa",
    "SlDMPs_merged.fa",
    "StDMPs_merged.fa",
    "NtDMPs_merged.fa",
    "BnaDMPs_merged.fa",
    "BoDMPs_merged.fa",
    "BjuDMPs_merged.fa",
    "ClDMPs_merged.fa",
    "CsDMPs_merged.fa",
    "MtDMPs_merged.fa",
    "GmDMPs_merged.fa",
    "GhDMPs_merged.fa",
    "OsDMPs_merged.fa",
]
# Protein FASTAs derived from merge_outputs[i] by frame-1 translation
# (modules/utils/translate_cds.py). Empty string ("") skips translation.
# These feed directly into config/DMP/02_blast_ortholog_alignment_DMP.toml
# query_protein_fastas (BLASTp queries against Smel HMMER hits).
merge_protein_outputs = [
    "AtDMPs_merged_protein.fa",
    "ZmDMPs_v2_merged_protein.fa",
    "SlDMPs_merged_protein.fa",
    "StDMPs_merged_protein.fa",
    "NtDMPs_merged_protein.fa",
    "BnaDMPs_merged_protein.fa",
    "BoDMPs_merged_protein.fa",
    "BjuDMPs_merged_protein.fa",
    "ClDMPs_merged_protein.fa",
    "CsDMPs_merged_protein.fa",
    "MtDMPs_merged_protein.fa",
    "GmDMPs_merged_protein.fa",
    "GhDMPs_merged_protein.fa",
    "OsDMPs_merged_protein.fa",
]

# ─────────────────────────────────────────────────────────────────────────────
# DMP GENE FAMILY — BROADER PHYLOGENETIC PANEL
# ─────────────────────────────────────────────────────────────────────────────
# Species used for DMP family-wide phylogenetics and comparative analysis.
# These are NOT verified haploid-inducer species; they provide phylogenetic
# context (outgroups, monocot/eudicot representatives, paralogy panels).
# Pre-built merged FASTAs for Physcomitrella, Setaria, Ananas, Musa, Populus,
# Brachypodium, Gossypium_raimondii, and Sorghum already exist in
# II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/; downloads are skipped ("").
[dmp_family]
dirs = [
    "Ipomoea_batatas",
    "Capsicum_annuum",
    "Physcomitrella_patens",
    "Setaria_italica",
    "Ananas_comosus",
    "Musa_acuminata",
    "Populus_trichocarpa",
    "Brachypodium_distachyon",
    "Gossypium_raimondii",
    "Sorghum_bicolor",
    "Other_DMPs",
]
downloads = [
    "download_IpDMPs_fasta.sh",
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/Capsicum_annuum_Pepper/
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_1_Physcomitrella_patens/
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_1_Setaria_italica/
    "",   # pre-built in II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_2_Ananas_comosus/
