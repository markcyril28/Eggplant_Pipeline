# ==============================================================================
# Script 2 — Compare Chain Stability  (GPU, full MD)
# (2_gromacs_compare_chain_stability_gpu.sh)
#
# PURPOSE: Run EM → NVT → NPT → Production MD for each complex, then
#          compute dynamics-based stability metrics and interaction energy
#          between chains. Answers: "Is the complex stable over time?"
#
# KEY OUTPUTS per structure:
#   analysis/rmsd.xvg       — Backbone RMSD vs time
#   analysis/rmsf.xvg       — Per-residue flexibility (RMSF)
#   analysis/gyrate.xvg     — Radius of gyration vs time
#   analysis/sasa.xvg       — SASA vs time
#   analysis/hbonds.xvg     — H-bond count vs time
#   analysis/mindist.xvg    — Min inter-chain distance vs time
#   interaction_energy.xvg  — Coul-SR + LJ-SR between chains (rerun)
#   statistics/md_statistics.json — Mean/std/min/max for all metrics
#
# HOW TO READ RESULTS:
#   • RMSD plateau < 0.3 nm = stable;  rising RMSD = unfolding
#   • High RMSF residues = flexible loops / disordered regions
#   • Interaction energy: Coul-SR < −200 kJ/mol + LJ-SR < −100 kJ/mol = strong
#   • Stable Rg over time = compact fold maintained
#
# Values here override common.toml defaults.
# ==============================================================================

[settings]
override_existing = true
mode              = "full"  # full | sim-only | viz-only | compare-only
box_distance      = 1.5
ion_concentration = 0.15
em_steps          = 50000
nvt_steps         = 100000  # 200 ps
npt_steps         = 100000  # 200 ps
md_steps          = 5000000 # 10 ns
gpu_id            = 0
max_threads       = 8
mdrun_option      = "Option_A"

# [structures]
# Structures loaded from config/<GENE_GROUP>/h_protein_structure_analysis.toml
# Uncomment below to override for this step only:
# [structures]
# active = [
#     "path/to/structure.cif",
# ]
