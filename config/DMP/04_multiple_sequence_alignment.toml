# --- v4 merged: union of all 7 paralog BLAST groups, deduped --------------
# Single combined FASTA per sequence type. Built by the inline merge step
# alongside build_v4_blast_groups.{sh,py}; keeps anchor order from
# [blast_groups_msa].paralog_ids and dedupes by header first-token.
[alignment.input_sets.selected_v4_blast_groups_merged_nucleotide]
