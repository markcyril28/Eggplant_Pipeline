dirs = [
    "Ipomoea_batatas",
    "Capsicum_annuum",
    "Physcomitrella_patens",
    "Setaria_italica",
    "Ananas_comosus",
    "Musa_acuminata",
    "Populus_trichocarpa",
    "Brachypodium_distachyon",
    "Gossypium_raimondii",
