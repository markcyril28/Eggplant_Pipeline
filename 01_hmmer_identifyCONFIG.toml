# ============================================================================
# Shared Pipeline Configuration — 01_Identification (HMMER) Defaults
# ============================================================================
# Tool parameters and target genomes shared across all gene groups.
# Per-group HMM profiles and seed alignments are defined below under
# [identification.gene_groups.{GROUP}] — one subsection per gene group.
#
# Consumers:
#   01_hmmer_identify.sh       — primary (reads all keys)
#   02_blast_alignment.sh      — reads identification.method only
#   07_plant_care_analysis.sh  — merges this file but only uses output_dirs
# ============================================================================

[pipeline]
# Gene groups to process. Available: "DMP", "HAP2", "GRF_GIF", "PLA"
gene_groups   = [
    "DMP",
    #"HAP2",
    #"GRF_GIF"
]

machine       = "Local"  # "Local" or "HPC" — selects compute profile below
overwrite     = true     # true = overwrite existing results; false = skip completed genomes
operations = [
    "BUILD_PROFILES",          # hmmbuild + hmmpress HMM profiles
    "SEARCH_GENOMES",          # hmmsearch (protein) + nhmmer (nucleotide) per genome
    "EXTRACT_GENE_STRUCTURES", # Parse GFF annotation → per-gene structure files (inc. structure.gb)
    "GENERATE_GENBANK",        # Rebuild structure.gb from existing structure.gff3 + structure.fa
    "GENERATE_REPORT",         # summary tables, figures, Markdown report
]

[pipeline.compute.Local]
threads       = 12       # Total CPU threads available
max_parallel  = 12        # Max genome searches to run in parallel

[pipeline.compute.HPC]
threads       = 32       # Total CPU threads available on HPC node
max_parallel  = 4        # Max genome searches to run in parallel


[identification]
method  = "hmmer"
db_type = "prot"                # "prot", "nucl", or "both" (prot + nucl searches)

# ---------- Protein HMMER search parameters (hmmsearch) ----------
[identification.hmmer_params]
e_value       = "1e-5"         # Post-search E-value filter (awk on domtblout col 7)
threads       = 8              # --cpu  (overridden by orchestrator --threads in production)

# Pfam gathering thresholds (recommended for Pfam HMM profiles)
use_ga        = true            # --cut_ga  Use Pfam per-family GA thresholds (overrides incE/incdomE)

# hmmsearch reporting thresholds (used only when use_ga = false)
incE          = "1e-10"         # --incE   inclusion E-value threshold (per-sequence)
incdomE       = "1e-10"         # --incdomE inclusion E-value threshold (per-domain)
reportE       = ""              # -E       reporting E-value threshold (per-sequence)
domE          = ""              # --domE   reporting E-value threshold (per-domain)

# hmmsearch score thresholds (mutually exclusive with E-value thresholds above)
incT          = ""              # --incT   inclusion bit-score threshold
incdomT       = ""              # --incdomT
reportT       = ""              # -T       reporting bit-score threshold
domT          = ""              # --domT

# hmmsearch misc
Z             = ""              # -Z   database size (sequences) for E-value calc
domZ          = ""              # --domZ domain database size
seed          = 42              # --seed  RNG seed for reproducibility
noali         = true            # --noali  omit alignment section in output
acc           = true            # --acc    prefer accessions over names (reliable ID matching)
notextw       = true            # --notextw  unlimit ASCII text output width

# ---------- Nucleotide HMMER search parameters (nhmmer) ----------
[identification.nhmmer_params]
e_value       = "1e-5"          # Post-search E-value filter for nucleotide hits
threads       = 8              # --cpu  (overridden by orchestrator --threads in production)
incE          = "1e-5"          # --incE   inclusion E-value threshold
seed          = 42              # --seed  RNG seed for reproducibility
noali         = true            # --noali  omit alignment section in output
notextw       = true            # --notextw  unlimit ASCII text output width
auto_build    = true            # Auto-build nucleotide HMM from protein-search transcript hits
min_hits_for_build = 3          # Minimum extracted transcripts needed to build nucleotide HMM

# ---------- CD-HIT PROTEIN clustering parameters ----------
[identification.cdhit_params]
identity      = 0.9             # -c   sequence identity threshold (0.0–1.0)
word_size     = 5               # -n   word size (2 for <0.5, 3 for 0.5–0.6, 4 for 0.6–0.7, 5 for 0.7–1.0)
memory        = 16000           # -M   memory limit in MB (0 = unlimited)
threads       = 8              # -T   threads (overridden by orchestrator --threads in production)
description   = 0               # -d   description length in .clstr file (0 = full)
aL            = 0.8             # -aL  alignment coverage for longer seq (80% minimum)
aS            = 0.8             # -aS  alignment coverage for shorter seq (80% minimum)
global_mode   = 1               # -G   1 = global, 0 = local
cluster_algo  = 1               # -g   0 = fast, 1 = accurate (slower)
min_length    = 10              # -l   minimum sequence length

# ---------- Gene-structure extraction + GenBank output ----------
# Controls EXTRACT_GENE_STRUCTURES and GENERATE_GENBANK operations.
# Each mRNA hit is written into two parallel subtrees under
# {genome}/e-value_*/e_GENE_Structures/{GENE}/:
#   without_up_and_downstream/{mRNA_ID}/  full feature breakdown, gene span only
#   with_up_and_downstream/{mRNA_ID}/     single FASTA record + GenBank with
#                                         flank_bp 5'/3' flanking sequence
# Each subtree contains structure.gff3 (shared), structure.fa, and a
# Benchling-ready structure.gb.
[identification.gene_structures]
flank_bp      = 1000              # 5'/3' flanking bp to include in structure.gb
                                  # (clamped at chromosome boundaries; 0 disables)
organism      = "Solanum melongena"  # Written to GenBank SOURCE/ORGANISM/source.organism

# ---------- CD-HIT-EST NUCLEOTIDE clustering parameters ----------
[identification.cdhit_est_params]
identity      = 0.9             # -c   sequence identity threshold (0.0–1.0)
word_size     = 8               # -n   word size (8-10 for >=0.9 identity)
memory        = 16000           # -M   memory limit in MB (0 = unlimited)
threads       = 8              # -T   threads (overridden by orchestrator --threads in production)
description   = 0               # -d   description length in .clstr file (0 = full)
aL            = 0.8             # -aL  alignment coverage for longer seq (80% minimum)
aS            = 0.8             # -aS  alignment coverage for shorter seq (80% minimum)
global_mode   = 1               # -G   1 = global, 0 = local
cluster_algo  = 1               # -g   0 = fast, 1 = accurate (slower)
min_length    = 30              # -l   minimum nucleotide sequence length
strand        = 0               # -r   0 = +/- strands, 1 = + strand only

