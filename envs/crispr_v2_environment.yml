# ============================================================================
# Conda environment specification — crispr_v2
# ============================================================================
# Used by the CRISPR v2 KO prediction pipeline (i_crispr_v2_pipeline.sh).
#
# Create:   conda env create -f envs/crispr_v2_environment.yml
# Update:   conda env update -f envs/crispr_v2_environment.yml --prune
# Activate: conda activate crispr_v2
#
# For tools not available on conda/PyPI (CRISPOR, inDelphi, Lindel), run
# setup_conda_crispr_v2.sh after creating this environment — it handles
# the git-clone installs automatically.
# ============================================================================

name: crispr_v2

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # ── Python version ─────────────────────────────────────────────────────────
  - python=3.10

  # ── Core scientific stack ──────────────────────────────────────────────────
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.12
  - scikit-learn>=1.3     # required by CRISPOR scoring models

  # ── Genomics / bioinformatics ──────────────────────────────────────────────
  - biopython>=1.81       # stages [5] and [6]: CDS extraction + translation
  - samtools>=1.17
  - bedtools>=2.31
  - blast>=2.14

  # ── Notebook / interactive inspection (optional) ──────────────────────────
  - jupyter

  # ── General utilities ──────────────────────────────────────────────────────
  - wget
  - git                   # needed by setup_conda_crispr_v2.sh for git-clone installs

  # ── pip-installed packages ─────────────────────────────────────────────────
  - pip
  - pip:
    # TOML parsing (Python < 3.11 stdlib fallback)
    - tomli>=2.0

    # CRISPOR Python dependencies
    - requests>=2.31
    - xlwt>=1.3
    - xlrd>=2.0
    - openpyxl>=3.1
    - twobitreader>=3.1     # CRISPOR: 2bit genome reader
    - pytabix>=0.1          # CRISPOR: tabix-indexed off-target lookups

    # Table formatting / output
    - tabulate>=0.9

    # On-target rescoring predictors.
    # NOTE: These packages may not be on PyPI and the markers below are
    # effectively no-ops (always True). If `conda env create` fails on these
    # lines, comment them out and use setup_conda_crispr_v2.sh instead — it
    # handles git-clone fallback installs automatically.
    # - crisprOn
    # - DeepSpCas9

    # Indel outcome predictors (same caveat as above).
    # - inDelphi
    # - Lindel

    # ESMFold API caller (optional — large; use API mode by default)
    # Uncomment for local ESMFold inference (requires GPU + ~12 GB RAM):
    # - fair-esm[esmfold]
