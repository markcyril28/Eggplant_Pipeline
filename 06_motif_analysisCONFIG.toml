# ============================================================================
# Shared defaults for 06_Motif_Analysis (MEME suite).
# Per-group overrides ([meme.inputs] FASTA lists, etc.) live in
# config/{GROUP}/06_motif_analysis_{GROUP}.toml.
# ============================================================================

[pipeline]
machine      = "Local"   # "Local" | "HPC" — picks the compute profile below
overwrite    = false
# Gene groups to run; each needs a config/{GROUP}/ directory.
gene_groups = [
    "DMP",
    #"GRF_GIF",
    #"PLA",
]

operations = [
    "RUN_READY_DATABASE",
    "RUN_MEME_SUITE_Analysis",
    "RUN_JPEG_Export",
]

[pipeline.compute.Local]
threads      = 12
max_parallel = 10        # concurrent TOMTOM/FIMO jobs (single-threaded)

[pipeline.compute.HPC]
threads      = 64
max_parallel = 64

[meme]
enabled       = true
# Alphabet filter — accepts amino_acid|protein|aa, nucleotide|dna|nt.
# Empty/missing key = both.
alphabets     = [
    "amino_acid",
    #"nucleotide",
]

databases_dir = "II_INPUTS/meme_motif_databases"  # run setup_meme_databases.sh once
# Steps (order matters): meme | tomtom | fimo | jpeg
steps         = "meme,jpeg"   # add tomtom,fimo as needed

# --- JPEG export ---
# color_scheme: default|nature|colorblind|dmp or path to .alph file (baked
# into MEME XML at discovery; re-run meme step to change).
color_scheme      = "nature"
jpeg_dpi          = 600
jpeg_columns      = 5
jpeg_quality      = 92        # 92 ≈ near-lossless
jpeg_logo_padding = 10        # px between logo tiles

# Motif location diagram: palette from config/colors_config/meme_motif_colors.toml
# (wong|warm|cool|pastel|high_contrast|dark|dmp_interaction) or comma-separated hex.
motif_location_palette = "dmp_interaction"
motif_location_bg      = "light"   # dark|light or hex (empty = white)
# Global font scale for the motif locations figure (MEME web-default layout
# with Name | p-value | Motif Locations columns and a Motif Consensus table
# at the bottom). 1.0 = native sizes; 1.4 boosts every text element for print.
motif_location_font_scale = 1.4

# --- Discovery ---
# Tuned for small families (~7 paralogs); for larger sets raise nmotifs and
# switch mod = "zoops".
nmotifs = 8
minw    = 6
maxw    = 50
mod     = "anr"   # anr|oops|zoops

# --- TOMTOM / FIMO databases (relative to databases_dir) ---
# Mixed DNA + protein; run_meme_pipeline.sh routes each query to compatible
# DBs by alphabet automatically.
tomtom_databases = "JASPAR/JASPAR2024_CORE_plants_non-redundant_v2.meme,ARABD/ArabidopsisDAPv1.meme,PROTEIN/elm2024.meme,PROTEIN/prosite2021_04.meme"
fimo_databases   = "JASPAR/JASPAR2024_CORE_plants_non-redundant_v2.meme,ARABD/ArabidopsisDAPv1.meme,PROTEIN/elm2024.meme,PROTEIN/prosite2021_04.meme"

# --- Threading ---
# All cores per MEME run, one job at a time. Lower optimal_threads for larger
# families so floor(cpu/optimal_threads) > 1 enables parallel MEME jobs.
optimal_threads = 12
time_limit      = 300    # seconds per MEME run
markov_order    = 0      # 0 = uniform; 3 = trinucleotide for large NT sets
