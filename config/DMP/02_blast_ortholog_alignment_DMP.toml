    "I_RefSeqs/d_DMP_Query_Fasta/Solanum_tuberosum/StDMPs_merged_protein.fa",
    "I_RefSeqs/d_DMP_Query_Fasta/Nicotiana_tabacum/NtDMPs_merged_protein.fa",
    "I_RefSeqs/d_DMP_Query_Fasta/Brassica_napus/BnaDMPs_merged_protein.fa",
    "I_RefSeqs/d_DMP_Query_Fasta/Brassica_oleracea/BoDMPs_merged_protein.fa",
    "I_RefSeqs/d_DMP_Query_Fasta/Brassica_juncea/BjuDMPs_merged_protein.fa",
    "I_RefSeqs/d_DMP_Query_Fasta/Citrullus_lanatus/ClDMPs_merged_protein.fa",
    "I_RefSeqs/d_DMP_Query_Fasta/Cucumis_sativus/CsDMPs_merged_protein.fa",
    "I_RefSeqs/d_DMP_Query_Fasta/Medicago_truncatula/MtDMPs_merged_protein.fa",
    "I_RefSeqs/d_DMP_Query_Fasta/Glycine_max/GmDMPs_merged_protein.fa",
    "I_RefSeqs/d_DMP_Query_Fasta/Gossypium_hirsutum/GhDMPs_merged_protein.fa",
    "I_RefSeqs/d_DMP_Query_Fasta/Oryza_sativa/OsDMPs_merged_protein.fa",
    # ── Older/historical inputs (II_INPUTS/DMP_query_fasta_file/) ──────────────
    # Protein companions to the gap-filler nucleotide queries above.
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_1_Physcomitrella_patens/PpDMPs_protein_merged_fasta.fa",   # Pp
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_1_Setaria_italica/SiDMPs_protein_merged_fasta.fa",         # Si
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_3_Musa_acuminata/MaDMPs_protein_merged_fasta.fa",          # Ma
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_4_Populus_trichocarpa/PtDMPs_protein_merged_fasta.fa",     # Pt
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_5_Brachypodium_distachyon/BdDMPs_protein_merged_fasta.fa", # Bd
    "II_INPUTS/DMP_query_fasta_file/2024_Paper_DMPs/GROUP_5_Gossypium_raimondii/GrDMPs_protein_merged_fasta.fa",     # Gr
    "II_INPUTS/DMP_query_fasta_file/Capsicum_annuum_Pepper/CaDMPs_prot_seq_merged.fasta",                            # Ca
    "II_INPUTS/DMP_query_fasta_file/Ipomea_batatas/IpDMPs_protein_merged_fasta.fa",                                  # Ib
]
