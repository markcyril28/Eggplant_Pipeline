# ==============================================================================
# Script 4 — Batch Comparison  (GPU+CPU, EM-only screening)
# (4_gromacs_batch_comparison.sh)
#
# PURPOSE: Fast screening of all structures in a dataset folder. Energy-
#          minimizes each, computes basic metrics, and ranks them — useful
#          for picking the best conformations before investing in full MD.
#          GPU offloads non-bonded + bonded forces; PME stays on CPU
#          (steep integrator limitation).
#
# KEY OUTPUTS per dataset:
#   <struct>/metrics.json     — Potential energy, Rg, SASA, H-bonds, contacts
#   comparison_report.txt     — Ranked table of all structures with explanations
#   plots/                    — Bar-chart comparisons (energy, Rg, SASA)
#
# HOW TO READ RESULTS:
#   • Structures ranked by potential energy (most negative = most stable)
#   • Compare Rg across structures: similar Rg = similarly compact
#   • Large SASA differences may indicate unfolded or poorly packed models
#   • Use this to shortlist structures for Step 2/5 full MD
#
# Values here override common.toml defaults.
# ==============================================================================

[settings]
override_existing = true
em_steps          = 2000
box_distance      = 0.8
box_type          = "cubic"
gpu_id            = 0
max_threads       = 8

[datasets]
# Dataset names from common.toml [paths.datasets]. Comment out to disable.
# NOTE: CIF files are in subdirs; batch_comparison uses find -maxdepth 1.
# Copy/symlink CIFs into a flat directory to use batch mode.
active = [
    # "SmelGRF-GIF",
    # "SmelDMP",
    # "SmelGIF-SWI2",
]
