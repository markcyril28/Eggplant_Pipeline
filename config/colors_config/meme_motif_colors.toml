# ============================================================================
# MEME Motif Location Plot — Color Palette Configuration
# ============================================================================
# Central palette definitions for the full-view motif location diagram
# generated by plot_motif_locations.py.
#
# Referenced from:  f_motif_analysisCONFIG.toml  (motif_location_palette, project root)
# Parsed via:       modules/utils/parse_toml.py
#
# Each version is a named array of hex colors assigned round-robin to motifs
# sorted by numeric ID.  With nmotifs ≤ 10 every motif gets a unique color;
# beyond 10, colors wrap.
#
# NOTE: These palettes control ONLY the motif-block colors in the location
#       diagram.  Sequence-logo letter colors are governed by the .alph files
#       in config/colors_config/meme_colors/ (selected via [meme].color_scheme).
# ============================================================================


# ── Available palette versions ──────────────────────────────────────────────
[versions]
names = ["wong", "warm", "cool", "pastel", "high_contrast", "dark", "dmp_interaction"]
default = "wong"


# ════════════════════════════════════════════════════════════════════════════
#  wong — Original Wong colorblind-safe palette (Nature Methods 2011)
# ════════════════════════════════════════════════════════════════════════════
[wong]
colors = [
    "#E69F00",   #  1  orange
    "#56B4E9",   #  2  sky blue
    "#009E73",   #  3  green
    "#F0E442",   #  4  yellow
    "#0072B2",   #  5  blue
    "#D55E00",   #  6  vermillion
    "#CC79A7",   #  7  pink
    "#999999",   #  8  grey
    "#44AA99",   #  9  teal
    "#882255",   # 10  wine
]


# ════════════════════════════════════════════════════════════════════════════
#  warm — DMP-inspired warm tones (coral → amber → peach gradient)
